<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Torneio Pro - v17</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #07080f;
  --s1: #0d0e18;
  --s2: #111320;
  --border: #1d1f33;
  --border2: #252840;
  --accent: #00e5a0;
  --accent2: #00b87d;
  --accentfade: rgba(0,229,160,.10);
  --blue: #3d8eff;
  --bluefade: rgba(61,142,255,.10);
  --gold: #ffbe00;
  --goldfade: rgba(255,190,0,.12);
  --silver: #8fa3b8;
  --bronze: #c87941;
  --red: #ff4d6a;
  --redfade: rgba(255,77,106,.10);
  --text: #e4e8f0;
  --muted: #4a5068;
  --dim: #2a2d44;
  --font: 'DM Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 4px; height: 4px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── LAYOUT ── */
#app { min-height: 100vh; display: flex; flex-direction: column; }
.topbar { background: var(--s1); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
.logo { font-family: var(--display); font-size: 20px; letter-spacing: 2px; color: var(--accent); display: flex; align-items: center; gap: 8px; line-height: 1; }
.logo small { font-family: var(--font); font-size: 9px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); display: block; margin-top: 1px; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.live-chip { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1.5s ease-in-out infinite; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.main { flex: 1; max-width: 880px; margin: 0 auto; width: 100%; padding: 16px; }

/* ── TABS ── */
.tabs { display: flex; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 6px; gap: 4px; flex-wrap: wrap; }
.tab { padding: 12px 20px; border-radius: 5px; border: none; cursor: pointer; font-size: 16px; font-family: var(--font); font-weight: 600; letter-spacing: .3px; color: var(--text); background: transparent; transition: all .15s; white-space: nowrap; min-height: 44px; display: flex; align-items: center; justify-content: center; }
.tab.on { background: var(--accent); color: #000; }
.tab:not(.on):hover { color: var(--text); }

/* ── CARDS ── */
.card { background: var(--s2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; overflow: hidden; }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg,var(--accent),var(--accent2),transparent); }
.card-head { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
.card-head .ch-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.card-head .ch-label { font-family: var(--display); font-size: 13px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
.page-title { font-family: var(--display); font-size: 30px; letter-spacing: 3px; color: var(--text); line-height: 1; margin-bottom: 3px; }
.page-sub { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

/* ── PIN SCREEN ── */
.pin-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.pin-box { background: var(--s2); border: 1px solid var(--border); border-radius: 16px; padding: 32px 28px; width: 320px; max-width: 95vw; text-align: center; }
.pin-title { font-family: var(--display); font-size: 28px; letter-spacing: 3px; color: var(--accent); margin-bottom: 6px; }
.pin-sub { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
.pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; }
.pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border2); background: transparent; transition: all .2s; }
.pin-dot.filled { background: var(--accent); border-color: var(--accent); }
.pin-dot.error { background: var(--red); border-color: var(--red); animation: shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.pin-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.pin-key { background: var(--s1); border: 1px solid var(--border); border-radius: 10px; padding: 14px; font-size: 20px; font-family: var(--display); letter-spacing: 2px; color: var(--text); cursor: pointer; transition: all .1s; user-select: none; }
.pin-key:active, .pin-key:hover { background: var(--accent); color: #000; border-color: var(--accent); transform: scale(.96); }
.pin-key.del { font-size: 14px; font-family: var(--font); font-weight: 700; }
.pin-err { color: var(--red); font-size: 12px; height: 20px; margin-top: 8px; }

/* ── COURT BANNERS ── */
.banner { border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; position: relative; overflow: hidden; }
.banner::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.banner-live { background: linear-gradient(135deg,rgba(0,229,160,.12),rgba(0,229,160,.04)); border: 1px solid rgba(0,229,160,.35); }
.banner-live::before { background: linear-gradient(90deg,var(--accent),rgba(0,229,160,.3),transparent); }
.banner-next { background: linear-gradient(135deg,rgba(61,142,255,.12),rgba(61,142,255,.04)); border: 1px solid rgba(61,142,255,.35); }
.banner-next::before { background: linear-gradient(90deg,var(--blue),rgba(61,142,255,.3),transparent); }
.banner-lbl { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 7px; }
.banner-lbl.live-lbl { color: var(--accent); }
.banner-lbl.next-lbl { color: var(--blue); }
.banner-teams { display: flex; align-items: center; gap: 8px; }
.banner-team { flex: 1; text-align: center; font-family: var(--display); font-size: 17px; letter-spacing: 1px; padding: 9px 6px; border-radius: 7px; }
.banner-team.live-team { background: rgba(0,229,160,.1); border: 1px solid rgba(0,229,160,.18); color: var(--text); }
.banner-team.next-team { background: rgba(61,142,255,.1); border: 1px solid rgba(61,142,255,.18); color: var(--text); }
.banner-vs { font-family: var(--display); font-size: 20px; opacity: .5; padding: 0 6px; flex-shrink: 0; }
.banner-score { font-family: var(--mono); font-size: 26px; font-weight: 700; min-width: 34px; text-align: center; color: var(--accent); flex-shrink: 0; }
.banner-ctx { font-size: 10px; text-align: center; margin-top: 8px; opacity: .6; }
.banner-ctx.live-ctx { color: var(--accent); }
.banner-ctx.next-ctx { color: var(--blue); }

/* ── GAME ROWS ── */
.game-list { display: flex; flex-direction: column; gap: 4px; }
.game-row { display: flex; align-items: center; gap: 6px; padding: 7px 8px; border-radius: 7px; border: 1px solid transparent; transition: all .15s; }
.game-row.pending { border-color: var(--border); }
.game-row.done { border-color: rgba(29,31,51,.5); opacity: .7; }
.game-row.is-live { border-color: rgba(0,229,160,.5); background: rgba(0,229,160,.07); animation: glow-live 3s ease-in-out infinite; }
.game-row.is-next { border-color: rgba(61,142,255,.4); background: rgba(61,142,255,.06); }
@keyframes glow-live { 0%,100%{border-color:rgba(0,229,160,.5)} 50%{border-color:rgba(0,229,160,.2)} }
.g-num { font-family: var(--mono); font-size: 9px; color: var(--muted); min-width: 22px; text-align: right; flex-shrink: 0; }
.g-team { flex: 1; font-size: 12px; font-weight: 500; padding: 5px 8px; background: var(--s1); border-radius: 5px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; transition: color .15s; }
.g-team.winner { color: var(--gold); font-weight: 700; }
.g-score { width: 36px; text-align: center; font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--muted); flex-shrink: 0; }
.g-score.winner { color: var(--gold); }
.g-score-inp { width: 36px; text-align: center; background: var(--bg); border: 1px solid var(--border2); border-radius: 5px; color: var(--text); font-family: var(--mono); font-size: 13px; font-weight: 700; padding: 4px 2px; outline: none; transition: border-color .15s; flex-shrink: 0; -moz-appearance: textfield; }
.g-score-inp::-webkit-inner-spin-button, .g-score-inp::-webkit-outer-spin-button { -webkit-appearance: none; }
.g-score-inp:focus { border-color: var(--accent); }
.g-vs { font-size: 10px; color: var(--muted); font-weight: 700; flex-shrink: 0; padding: 0 1px; }
.g-badge { font-size: 8px; font-weight: 700; letter-spacing: 1px; flex-shrink: 0; }
.g-badge.live-badge { color: var(--accent); }
.g-badge.next-badge { color: var(--blue); }
.g-ok { font-size: 10px; color: var(--accent); flex-shrink: 0; }

/* ── COURT SELECTOR (ADMIN) ── */
.court-pick { display: flex; gap: 4px; flex-shrink: 0; }
.cp-btn { border: none; border-radius: 4px; padding: 3px 7px; font-size: 9px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; cursor: pointer; font-family: var(--font); transition: all .15s; }
.cp-live { background: rgba(0,229,160,.15); color: var(--accent); border: 1px solid rgba(0,229,160,.3); }
.cp-live:hover, .cp-live.on { background: var(--accent); color: #000; }
.cp-next { background: rgba(61,142,255,.15); color: var(--blue); border: 1px solid rgba(61,142,255,.3); }
.cp-next:hover, .cp-next.on { background: var(--blue); color: #fff; }

/* ── CLASSIFICATION TABLE ── */
.cls-wrap { overflow-x: auto; margin-bottom: 12px; }
.cls-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.cls-table th { background: var(--bg); color: var(--muted); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 7px 8px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
.cls-table th.c, .cls-table td.c { text-align: center; }
.cls-table td { padding: 9px 8px; border-bottom: 1px solid rgba(29,31,51,.5); }
.cls-table tr:last-child td { border-bottom: none; }
.cls-table tr.qualify td { background: var(--accentfade); }
.rank { width: 22px; height: 22px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; font-family: var(--mono); }
.r1 { background: rgba(255,190,0,.2); color: var(--gold); }
.r2 { background: rgba(143,163,184,.2); color: var(--silver); }
.r3 { background: rgba(200,121,65,.2); color: var(--bronze); }
.rn { background: var(--dim); color: var(--muted); }
.pts-badge { background: var(--accentfade); color: var(--accent); border: 1px solid rgba(0,229,160,.25); border-radius: 4px; padding: 1px 7px; font-family: var(--mono); font-size: 11px; font-weight: 700; }

/* ── ELIM SLOTS ── */
.elim-slot { display: flex; align-items: center; gap: 6px; padding: 9px 10px; background: var(--s1); border: 1px solid var(--border); border-radius: 7px; margin-bottom: 6px; }
.elim-lbl { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; min-width: 56px; flex-shrink: 0; color: var(--muted); }
.elim-final { border-color: rgba(255,190,0,.4); background: linear-gradient(135deg, var(--s2), rgba(255,190,0,.06)); }
.elim-final .elim-lbl { color: var(--gold); }
.elim-third { border-color: rgba(200,121,65,.35); }
.elim-third .elim-lbl { color: var(--bronze); }
.elim-semi .elim-lbl { color: #a78bfa; }
.elim-slot.is-live { border-color: rgba(0,229,160,.45); background: rgba(0,229,160,.06); }
.elim-slot.is-next { border-color: rgba(61,142,255,.35); background: rgba(61,142,255,.05); }

/* ── BRACKET ── */
.brk-round-title { font-family: var(--display); font-size: 13px; letter-spacing: 2px; color: var(--accent); margin: 14px 0 8px; }

/* ── BUTTONS ── */
.btn { border: none; border-radius: 7px; padding: 8px 18px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: var(--font); transition: all .15s; display: inline-flex; align-items: center; gap: 6px; letter-spacing: .2px; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-ghost { background: var(--s1); color: var(--muted); border: 1px solid var(--border2); }
.btn-ghost:hover { color: var(--text); border-color: var(--accent); }
.btn-danger { background: var(--redfade); color: var(--red); border: 1px solid rgba(255,77,106,.3); }
.btn-danger:hover { background: rgba(255,77,106,.2); }
.btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 5px; }
.btn-blue { background: var(--bluefade); color: var(--blue); border: 1px solid rgba(61,142,255,.3); }
.btn-blue:hover { background: rgba(61,142,255,.2); }

/* ── INPUTS ── */
.inp { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); padding: 8px 11px; font-size: 13px; font-family: var(--font); outline: none; transition: border-color .15s; }
.inp:focus { border-color: var(--accent); }
.textarea { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); padding: 11px; font-size: 12px; font-family: var(--mono); outline: none; min-height: 130px; resize: vertical; line-height: 1.7; transition: border-color .15s; }
.textarea:focus { border-color: var(--accent); }
label.lbl { display: block; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }

/* ── FORMAT GRID ── */
.fmt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 8px 0 12px; }
.fmt-card { padding: 11px 12px; background: var(--s1); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all .15s; }
.fmt-card:hover, .fmt-card.sel { border-color: var(--accent); background: var(--accentfade); }
.fmt-card .fi { font-size: 18px; margin-bottom: 5px; }
.fmt-card .fn { font-size: 12px; font-weight: 700; margin-bottom: 2px; }
.fmt-card .fd { font-size: 10px; color: var(--muted); line-height: 1.4; }

/* ── NOTICES ── */
.notice { padding: 8px 12px; border-radius: 7px; font-size: 11px; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.notice-ok { background: rgba(0,229,160,.1); border: 1px solid rgba(0,229,160,.25); color: var(--accent); }
.notice-info { background: var(--bluefade); border: 1px solid rgba(61,142,255,.25); color: var(--blue); }

/* ── PODIUM ── */
.podium { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.p-slot { flex: 1; text-align: center; padding: 12px 8px; border-radius: 8px; border: 1px solid transparent; }
.p1 { background: rgba(255,190,0,.1); border-color: rgba(255,190,0,.3); }
.p2 { background: rgba(143,163,184,.1); border-color: rgba(143,163,184,.2); }
.p3 { background: rgba(200,121,65,.1); border-color: rgba(200,121,65,.2); }
.p-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; margin-bottom: 5px; }
.p-team { font-size: 13px; font-weight: 700; }

/* ── AWARDS / VOTING ── */
.award-card { background: var(--s1); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
.award-title { font-family: var(--display); font-size: 16px; letter-spacing: 2px; color: var(--gold); margin-bottom: 8px; }
.vote-option { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg); border: 1.5px solid var(--border); border-radius: 7px; cursor: pointer; margin-bottom: 5px; transition: all .15s; user-select: none; }
.vote-option:hover:not(.voted-mine):not(.result-mode) { border-color: var(--gold); }
.vote-option.voted-mine { border-color: var(--gold); background: rgba(255,190,0,.08); }
.vote-option.result-mode { cursor: default; }
.vote-bar-wrap { flex: 1; height: 5px; background: var(--dim); border-radius: 3px; overflow: hidden; }
.vote-bar { height: 100%; background: var(--gold); border-radius: 3px; transition: width .4s; }
.vote-pct { font-family: var(--mono); font-size: 11px; color: var(--gold); min-width: 32px; text-align: right; }
.vote-name { font-size: 12px; font-weight: 500; flex: 1; }
.vote-count { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.voted-badge { font-size: 9px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }

/* ── DIVIDER ── */
.divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
.section-lbl { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 14px 0 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.swiss-badge { background: rgba(61,142,255,.15); color: var(--blue); border: 1px solid rgba(61,142,255,.3); border-radius: 4px; padding: 2px 9px; font-family: var(--mono); font-size: 10px; font-weight: 700; }
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty .ei { font-size: 44px; margin-bottom: 12px; }
.empty h2 { font-family: var(--display); font-size: 22px; letter-spacing: 2px; margin-bottom: 6px; color: var(--text); }
.tag { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; display: inline-block; }
.err { color: var(--red); font-size: 11px; margin-top: 6px; }
@media(max-width:580px){ .two-col{grid-template-columns:1fr} .fmt-grid{grid-template-columns:1fr} .page-title{font-size:24px} .banner-team{font-size:13px} }

/* ── REFEREE MOBILE ── */
.ref-wrap{max-width:720px;margin:0 auto;width:100%;}
.ref-filter{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 14px;align-items:center;}
.ref-filter-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);width:100%;}
.ref-filter-btn{border:1px solid var(--border2);background:var(--s1);color:var(--text);border-radius:999px;padding:9px 13px;font-weight:800;font-size:13px;cursor:pointer;}
.ref-filter-btn.on{background:var(--accent);border-color:var(--accent);color:#000;}
.ref-card{background:#000;border:1px solid var(--border2);border-radius:18px;padding:18px 14px;margin-bottom:14px;box-shadow:0 10px 30px rgba(0,0,0,.35);}
.ref-court{font-family:var(--display);font-size:28px;letter-spacing:3px;color:var(--accent);text-align:center;line-height:1;}
.ref-context{text-align:center;color:var(--muted);font-size:11px;letter-spacing:2px;text-transform:uppercase;margin:6px 0 16px;}
.ref-scoreboard{display:grid;grid-template-columns:1fr 54px 1fr;gap:8px;align-items:center;}
.ref-team{text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.ref-team-name{font-size:22px;font-weight:800;color:#fff;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ref-points{font-family:var(--mono);font-size:76px;font-weight:800;line-height:.9;color:#00ff20;text-shadow:0 0 14px rgba(0,255,32,.25);}
.ref-vs{font-size:54px;font-weight:900;color:#fff;text-align:center;}
.ref-plus,.ref-minus{width:58px;height:58px;border-radius:50%;border:none;background:#fff;color:#000;font-size:34px;font-weight:900;line-height:1;cursor:pointer;}
.ref-minus{font-size:38px;background:#202436;color:#fff;border:1px solid var(--border2);}
.ref-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px;}
.ref-next{margin-top:16px;padding:12px;border:1px solid rgba(61,142,255,.3);background:rgba(61,142,255,.08);border-radius:12px;text-align:center;}
.ref-next-label{font-size:9px;font-weight:800;letter-spacing:2px;color:var(--blue);margin-bottom:5px;}
.ref-next-game{font-size:16px;font-weight:800;color:#fff;}

.ref-timeout-panel{margin-top:18px;padding:14px;border:1px solid rgba(255,190,0,.28);background:rgba(255,190,0,.07);border-radius:14px;text-align:center;}
.ref-timeout-title{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--gold);margin-bottom:10px;}
.ref-timeout-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

<script>


// ══════════════════════════════════════════════════════════
//  STORAGE  (Firebase Realtime DB — free tier, no login)
//  We use a public read/write DB key stored in the app.
//  For production replace FIREBASE_URL with your own project.
// ══════════════════════════════════════════════════════════
const DB_URL = "https://torneio-ric-default-rtdb.firebaseio.com";
const DB_KEY = "torneios_multi";

async function dbSave(data) {
  try {
    await fetch(`${DB_URL}/${DB_KEY}.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
  } catch(e) { console.warn("DB save failed", e); }
}

async function dbLoad() {
  try {
    const r = await fetch(`${DB_URL}/${DB_KEY}.json`);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

// ══════════════════════════════════════════════════════════
//  MULTI-TOURNAMENT HELPERS
// ══════════════════════════════════════════════════════════
function makeTournamentId() {
  return "t_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2,7);
}
function normalizeMultiData(data) {
  if (!data) return { tournaments:{}, updatedAt:null };
  if (data.tournaments && typeof data.tournaments === "object") return data;
  // compatibilidade: se alguém apontar para um nó antigo de torneio único
  if (data.tournament && isValidTournament(data.tournament)) {
    return { tournaments:{ legado:{ id:"legado", title:data.tournament.title || "Torneio legado", status:"ativo", tournament:data.tournament, updatedAt:data.updatedAt || Date.now() } }, updatedAt:data.updatedAt || Date.now() };
  }
  return { tournaments:{}, updatedAt:null };
}
function tournamentEntries(statusFilter="all") {
  const ts = STATE.tournaments || {};
  return Object.entries(ts).map(([id,rec])=>({id, ...rec}))
    .filter(r => r && r.tournament && isValidTournament(r.tournament))
    .filter(r => statusFilter === "all" || (r.status || "ativo") === statusFilter)
    .sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
}
function selectTournament(id) {
  const rec = STATE.tournaments?.[id];
  setState({ selectedTournamentId:id, tournament:rec?.tournament || null, lastUpdated:rec?.updatedAt || null, refCourtFilter:"", adminTab: rec?.tournament ? "manage" : "create" });
}
function selectedTournamentRecord() {
  const id = STATE.selectedTournamentId;
  return id ? STATE.tournaments?.[id] : null;
}
function courtUsageMap() {
  const usage = {};
  const selectedId = String(STATE.selectedTournamentId || "");
  Object.entries(STATE.tournaments || {}).forEach(([id, rec]) => {
    if (!rec || (rec.status || "ativo") !== "ativo" || !rec.tournament) return;
    getCourts(rec.tournament).forEach(c => {
      const label = courtLabel(c);
      if (!usage[label]) usage[label] = [];
      usage[label].push({
        tournamentId: id,
        title: rec.title || rec.tournament.title || "Torneio",
        isCurrent: String(id) === selectedId,
        liveId: c.liveId || null,
        nextId: c.nextId || null
      });
    });
  });
  return usage;
}

function renderCourtUsageMap(currentTournament) {
  const usage = courtUsageMap();
  const configured = new Set(getCourts(currentTournament).map(c => courtLabel(c)));
  const card = div("card");
  card.appendChild(renderCardHead("Mapa de uso das quadras"));
  card.appendChild(el("p", { style:{ fontSize:"11px", color:"var(--muted)", marginBottom:"8px" } }, "Visão global das 12 quadras. Passe o mouse sobre uma quadra ocupada para ver o torneio associado. A visualização é informativa e não bloqueia a configuração."));
  const grid = div("court-map-grid");
  for (let i = 1; i <= 12; i++) {
    const label = String(i);
    const rows = usage[label] || [];
    const hasCurrent = configured.has(label);
    const hasOther = rows.some(r => !r.isCurrent);
    const cls = "court-map-seat " + (hasCurrent ? "current" : hasOther ? "used" : "free");
    const titles = rows.length ? rows.map(r => `${r.isCurrent ? "Torneio atual" : "Torneio"}: ${safeText(r.title)}${r.liveId ? " · em quadra" : ""}${r.nextId ? " · próximo" : ""}`).join("\n") : "Quadra livre";
    const state = hasCurrent ? "neste torneio" : hasOther ? "em uso" : "livre";
    const cell = el("div", { class: cls, title: titles });
    cell.appendChild(el("div", { class:"cm-num" }, `Q${label}`));
    cell.appendChild(el("div", { class:"cm-state" }, state));
    grid.appendChild(cell);
  }
  card.appendChild(grid);
  const legend = div("court-map-legend");
  legend.appendChild(el("span", {}, el("span", {class:"court-map-dot free"}), "Livre"));
  legend.appendChild(el("span", {}, el("span", {class:"court-map-dot used"}), "Usada por outro torneio ativo"));
  legend.appendChild(el("span", {}, el("span", {class:"court-map-dot current"}), "Configurada neste torneio"));
  card.appendChild(legend);
  return card;
}
async function saveMultiStore() {
  await dbSave({ tournaments: STATE.tournaments || {}, updatedAt: Date.now() });
}
function renderTournamentSelector(mode="public") {
  const entries = tournamentEntries(mode === "admin" ? (STATE.adminListFilter || "ativo") : "ativo");
  const card = div("tournament-select-card");
  card.appendChild(renderCardHead(mode === "ref" ? "Selecionar torneio para arbitragem" : "Selecionar torneio"));
  if (!entries.length) {
    card.appendChild(el("p", {style:{fontSize:"12px", color:"var(--muted)"}}, mode === "admin" ? "Nenhum torneio neste filtro." : "Nenhum torneio ativo disponível."));
    return card;
  }
  const row = div("tournament-pill-row");
  entries.forEach(r=>{
    const b = el("button", {class:"tournament-pill" + (String(STATE.selectedTournamentId)===String(r.id)?" on":"") + ((r.status||"ativo")==="encerrado"?" closed":""), onClick:()=>selectTournament(r.id)}, safeText(r.title || r.tournament?.title || "Torneio"));
    row.appendChild(b);
  });
  card.appendChild(row);
  return card;
}
function renderAdminTournamentList() {
  const card = div("tournament-select-card");
  card.appendChild(renderCardHead("Torneios"));
  const filters = div("tournament-pill-row");
  [{id:"all",lbl:"Todos"},{id:"ativo",lbl:"Ativos"},{id:"encerrado",lbl:"Encerrados"}].forEach(f=>{
    filters.appendChild(el("button", {class:"tournament-pill"+(STATE.adminListFilter===f.id?" on":""), onClick:()=>setState({adminListFilter:f.id})}, f.lbl));
  });
  card.appendChild(filters);
  const entries = tournamentEntries(STATE.adminListFilter || "ativo");
  if (!entries.length) card.appendChild(el("p", {style:{fontSize:"12px", color:"var(--muted)", marginTop:"10px"}}, "Nenhum torneio encontrado neste filtro."));
  entries.forEach(r=>{
    const row = div("admin-list-row" + (String(STATE.selectedTournamentId)===String(r.id)?" on":""));
    const info = div("");
    info.appendChild(el("div", {style:{fontWeight:"700"}}, safeText(r.title || r.tournament?.title || "Torneio")));
    info.appendChild(el("div", {class:"tournament-meta"}, `${(r.status||"ativo").toUpperCase()} · ${r.updatedAt ? new Date(r.updatedAt).toLocaleString("pt-BR") : "sem data"}`));
    row.appendChild(info);
    const acts = div("court-pick");
    acts.appendChild(btn("btn-blue btn-sm", "Abrir", ()=>selectTournament(r.id)));
    if((r.status||"ativo")!=="encerrado") acts.appendChild(btn("btn-danger btn-sm", "Encerrar", async ()=>{ STATE.tournaments[r.id] = {...r, status:"encerrado", updatedAt:Date.now()}; if(STATE.selectedTournamentId===r.id) STATE.lastUpdated=STATE.tournaments[r.id].updatedAt; render(); await saveMultiStore(); }));
    row.appendChild(acts);
    card.appendChild(row);
  });
  card.appendChild(el("div", {style:{marginTop:"10px"}}, btn("btn-primary btn-sm", "➕ Novo torneio", ()=>setState({selectedTournamentId:null, tournament:null, adminTab:"create", createDraft:{text:"",title:"",teams:"",fmt:"sg"}}))));
  return card;
}

// ══════════════════════════════════════════════════════════
//  SCHEDULE HELPERS
// ══════════════════════════════════════════════════════════
function roundRobin(teams) {
  const list = [...teams];
  if (list.length % 2) list.push("__BYE__");
  const n = list.length, fixed = list[0], rot = list.slice(1), games = [];
  let id = 1;
  for (let r = 0; r < n - 1; r++) {
    const c = [fixed, ...rot];
    for (let i = 0; i < n / 2; i++) {
      const a = c[i], b = c[n-1-i];
      if (a !== "__BYE__" && b !== "__BYE__") games.push({ id: id++, a, b, sA: null, sB: null });
    }
    rot.unshift(rot.pop());
  }
  return games;
}

function defaultRulesForSport(sport) {
  const sp = sport || "futebol";
  if (sp === "volei" || sp === "voleipraia" || sp === "futevolei") {
    return {
      sport: sp,
      matchMode: "sets",
      setsToWin: 2,
      pointsPerSet: sp === "futevolei" ? 18 : (sp === "voleipraia" ? 21 : 25),
      tieBreakPoints: 15,
      standingsCriteria: ["wins","headToHead","setDiff","pointDiff","pointsFor"]
    };
  }
  return {
    sport: sp,
    matchMode: "score",
    winPoints: 3,
    drawPoints: 1,
    lossPoints: 0,
    standingsCriteria: ["points","wins","headToHead","goalDiff","goalsFor"]
  };
}

function sportLabel(sport) {
  return ({volei:"Vôlei",voleipraia:"Vôlei de Praia",futevolei:"Futevôlei",futebol:"Futebol",futsal:"Futsal"})[sport] || "-";
}

function formatLabel(fmt) {
  return ({sg:"Grupo Único",mg:"Múltiplos Grupos",mgk:"Grupos + Mata-Mata",se:"Mata-Mata",sw:"Sistema Suíço"})[fmt] || "-";
}

function criteriaLabels(rules) {
  const labels = {
    points:"Pontos", wins:"Vitórias", headToHead:"Confronto direto", setDiff:"Saldo de sets",
    pointDiff:"Saldo de pontos", pointsFor:"Pontos pró", goalDiff:"Saldo de gols", goalsFor:"Gols pró"
  };
  const arr = (rules?.standingsCriteria || defaultRulesForSport(rules?.sport).standingsCriteria);
  return arr.map(x => labels[x] || x);
}

function calcHeadToHeadScore(team, other, games, rules) {
  let score = 0;
  (games||[]).forEach(g => {
    if (!hasScorePair(g.sA, g.sB)) return;
    const involved = (g.a===team && g.b===other) || (g.b===team && g.a===other);
    if (!involved) return;
    const a=+g.sA, b=+g.sB;
    const won = (g.a===team && a>b) || (g.b===team && b>a);
    const drew = a===b;
    if (won) score += 3;
    else if (drew) score += 1;
  });
  return score;
}

function calcStats(teams, games, rules) {
  const r = rules || defaultRulesForSport("futebol");
  const setSportMode = isSetSport(r) || r.matchMode === "sets" || r.sport === "volei" || r.sport === "voleipraia" || r.sport === "futevolei";
  const s = {};
  teams.forEach(t => { s[t] = { w:0, d:0, l:0, pts:0, gf:0, ga:0, played:0, setsFor:0, setsAgainst:0 }; });

  (games||[]).forEach(g => {
    if (!s[g.a] || !s[g.b]) return;

    if (setSportMode) {
      const sets = Array.isArray(g.sets) ? g.sets.filter(st => isValidNumber(st?.a) && isValidNumber(st?.b)) : [];
      if (!sets.length) return;

      let aSets = 0, bSets = 0, aPts = 0, bPts = 0;
      sets.forEach(st => {
        const pa = Number(st.a), pb = Number(st.b);
        aPts += pa; bPts += pb;
        if (pa > pb) aSets++;
        else if (pb > pa) bSets++;
      });

      s[g.a].gf += aPts; s[g.a].ga += bPts;
      s[g.b].gf += bPts; s[g.b].ga += aPts;
      s[g.a].setsFor += aSets; s[g.a].setsAgainst += bSets;
      s[g.b].setsFor += bSets; s[g.b].setsAgainst += aSets;

      const setsToWin = Number(r.setsToWin || 2);
      const finishedBySets = g.status === "finished" || aSets >= setsToWin || bSets >= setsToWin;
      if (finishedBySets) {
        s[g.a].played++; s[g.b].played++;
        if (aSets > bSets) { s[g.a].w++; s[g.b].l++; }
        else if (bSets > aSets) { s[g.b].w++; s[g.a].l++; }
        else { s[g.a].d++; s[g.b].d++; }
      }
      return;
    }

    if (!hasScorePair(g.sA, g.sB)) return;
    const a=+g.sA, b=+g.sB;
    s[g.a].played++; s[g.b].played++;
    s[g.a].gf+=a; s[g.a].ga+=b; s[g.b].gf+=b; s[g.b].ga+=a;
    if (a>b){s[g.a].w++;s[g.a].pts+=(r.winPoints??3);s[g.b].l++;s[g.b].pts+=(r.lossPoints??0);}
    else if(b>a){s[g.b].w++;s[g.b].pts+=(r.winPoints??3);s[g.a].l++;s[g.a].pts+=(r.lossPoints??0);}
    else{s[g.a].d++;s[g.a].pts+=(r.drawPoints??1);s[g.b].d++;s[g.b].pts+=(r.drawPoints??1);}
  });

  const rows = teams.map(t=>({team:t,...s[t],diff:s[t].gf-s[t].ga,setDiff:(s[t].setsFor||0)-(s[t].setsAgainst||0)}));
  const criteria = r.standingsCriteria || (setSportMode ? ["wins","headToHead","setDiff","pointDiff","pointsFor"] : ["points","wins","headToHead","goalDiff","goalsFor"]);
  return rows.sort((a,b)=>{
    for (const c of criteria) {
      let av=0,bv=0;
      if(c==="points"){av=a.pts;bv=b.pts;}
      else if(c==="wins"){av=a.w;bv=b.w;}
      else if(c==="goalDiff"||c==="pointDiff"){av=a.diff;bv=b.diff;}
      else if(c==="goalsFor"||c==="pointsFor"){av=a.gf;bv=b.gf;}
      else if(c==="setDiff"){av=a.setDiff||0;bv=b.setDiff||0;}
      else if(c==="headToHead"){av=calcHeadToHeadScore(a.team,b.team,games,r);bv=calcHeadToHeadScore(b.team,a.team,games,r);}
      if (bv-av) return bv-av;
    }
    return String(a.team).localeCompare(String(b.team));
  });
}

function pow2(n){let p=1;while(p<n)p*=2;return p;}
function rndName(n){return n===1?"Final 🏆":n===2?"Semifinal":n===4?"Quartas de Final":n===8?"Oitavas":`Round de ${n*2}`;}

function seedOrder(size) {
  if (size <= 1) return [1];
  const prev = seedOrder(size / 2);
  return prev.flatMap(s => [s, size + 1 - s]);
}

function normalizeSeedEntry(entry, idx) {
  if (entry === null || entry === undefined) return null;
  if (typeof entry === "object") return { team: entry.team || entry.name || String(entry), group: entry.group || entry.grp || null, seed: entry.seed || idx + 1 };
  return { team: String(entry), group: null, seed: idx + 1 };
}

function seedTeam(seed) { return seed ? seed.team : null; }
function seedGroup(seed) { return seed ? seed.group || null : null; }

function setGameSide(game, side, seed) {
  game[side] = seedTeam(seed);
  game[side + "Seed"] = seed ? seed.seed : null;
  game[side + "Group"] = seedGroup(seed);
}

function advanceSeed(rounds, fromRoundIndex, fromGameIndex, seed) {
  const nextRound = rounds[fromRoundIndex + 1];
  if (!nextRound || !seed) return;
  const nextGameIndex = Math.floor(fromGameIndex / 2);
  const side = fromGameIndex % 2 === 0 ? "a" : "b";
  if (nextRound.games[nextGameIndex]) setGameSide(nextRound.games[nextGameIndex], side, seed);
}

function wouldRepeatGroup(game) {
  return game && game.aGroup && game.bGroup && game.aGroup === game.bGroup;
}

function avoidSameGroupFirstRound(games) {
  // Heurística simples: quando um jogo da primeira rodada repete grupo, tenta trocar
  // o visitante com outro jogo sem criar nova repetição. Não bloqueia a chave se não houver alternativa.
  for (let i = 0; i < games.length; i++) {
    if (!wouldRepeatGroup(games[i])) continue;
    for (let j = 0; j < games.length; j++) {
      if (i === j) continue;
      for (const side of ["a", "b"]) {
        const gi = JSON.parse(JSON.stringify(games[i]));
        const gj = JSON.parse(JSON.stringify(games[j]));
        const otherSide = side;
        const tmp = { team: gj[otherSide], group: gj[otherSide + "Group"], seed: gj[otherSide + "Seed"] };
        if (!tmp.team) continue;
        setGameSide(gj, otherSide, { team: gi.b, group: gi.bGroup, seed: gi.bSeed });
        setGameSide(gi, "b", tmp);
        if (!wouldRepeatGroup(gi) && !wouldRepeatGroup(gj)) {
          games[i] = gi; games[j] = gj; return games;
        }
      }
    }
  }
  return games;
}

function buildBracket(seeds, options = {}) {
  const normalized = (seeds || []).map(normalizeSeedEntry).filter(s => s && s.team);
  const sz = pow2(normalized.length || 2);
  const order = seedOrder(sz);
  const slots = order.map(seedNum => normalized[seedNum - 1] || null);
  const rounds = [];
  let curLen = slots.length;
  let rn = 1;
  while (curLen > 1) {
    const games = [];
    for (let i = 0; i < curLen; i += 2) {
      const g = { id:`R${rn}G${i/2+1}`, a:null, b:null, sA:null, sB:null };
      if (rn === 1) {
        setGameSide(g, "a", slots[i]);
        setGameSide(g, "b", slots[i + 1]);
        if (g.a && !g.b) g.byeWinner = g.a;
        if (!g.a && g.b) g.byeWinner = g.b;
      }
      games.push(g);
    }
    rounds.push({ rn, name:rndName(curLen/2), games });
    curLen = curLen / 2; rn++;
  }

  if (options.avoidSameGroupFirstRound !== false) {
    rounds[0].games = avoidSameGroupFirstRound(rounds[0].games);
  }

  rounds[0].games.forEach((g, gi) => {
    if (g.a && !g.b) advanceSeed(rounds, 0, gi, { team:g.a, group:g.aGroup, seed:g.aSeed });
    if (!g.a && g.b) advanceSeed(rounds, 0, gi, { team:g.b, group:g.bGroup, seed:g.bSeed });
  });

  rounds.bracketMeta = {
    bracketSize: sz,
    byes: Math.max(0, sz - normalized.length),
    byeStrategy: "topSeeds",
    avoidSameGroupFirstRound: options.avoidSameGroupFirstRound !== false
  };
  return rounds;
}

function propagateBracket(rounds) {
  const r = JSON.parse(JSON.stringify(rounds));
  for(let ri=0;ri<r.length-1;ri++){
    r[ri].games.forEach((g,gi)=>{
      if(g.sA===null||g.sB===null) return;
      const w = +g.sA>+g.sB?g.a:+g.sB>+g.sA?g.b:null;
      if(!w) return;
      const ni=Math.floor(gi/2);
      if(r[ri+1].games[ni]){if(gi%2===0)r[ri+1].games[ni].a=w;else r[ri+1].games[ni].b=w;}
    });
  }
  return r;
}

function swissPair(teams, prevGames, standing) {
  const sorted=[...standing].sort((a,b)=>b.pts-a.pts||b.diff-a.diff);
  const done=new Set(); const games=[]; let id=(prevGames?.length||0)+1;
  for(let i=0;i<sorted.length;i++){
    if(done.has(sorted[i].team)) continue;
    for(let j=i+1;j<sorted.length;j++){
      if(done.has(sorted[j].team)) continue;
      if(!prevGames?.some(g=>(g.a===sorted[i].team&&g.b===sorted[j].team)||(g.b===sorted[i].team&&g.a===sorted[j].team))){
        games.push({id:id++,a:sorted[i].team,b:sorted[j].team,sA:null,sB:null});
        done.add(sorted[i].team);done.add(sorted[j].team);break;
      }
    }
  }
  return games;
}

function normalizeGameKey(key) {
  if (!key) return key;
  // Compatibilidade com versões anteriores, que salvavam Grupo-1 em vez de sg-1.
  if (String(key).startsWith("Grupo-")) return "sg-" + String(key).slice("Grupo-".length);
  return key;
}

function selectedGame(games, key) {
  if (!key) return null;
  const k = normalizeGameKey(key);
  return games.find(g => normalizeGameKey(g.key) === k) || games.find(g => g.key === key) || null;
}


function normalizeCourtLabel(v, fallback) {
  const raw = (v === undefined || v === null || v === "") ? fallback : v;
  const s = String(raw).trim();
  return s || String(fallback);
}

function courtLabel(c) {
  return normalizeCourtLabel(c?.label ?? c?.id ?? c?.n, "-");
}

function getCourts(t) {
  const legacy = [{ id: "1", label: "1", n: 1, liveId: t?.liveId || null, nextId: t?.nextId || null }];
  const base = Array.isArray(t?.courts) && t.courts.length ? t.courts : legacy;
  return base.map((c, i) => {
    const label = normalizeCourtLabel(c?.label ?? c?.id ?? c?.n, i + 1);
    return {
      id: label,
      label,
      n: Number.isFinite(Number(c?.n)) ? Number(c.n) : i + 1,
      liveId: c?.liveId ? normalizeGameKey(c.liveId) : null,
      nextId: c?.nextId ? normalizeGameKey(c.nextId) : null,
      finished: c?.finished || null
    };
  });
}

function withCourtCount(t, count) {
  const n = Math.max(1, Math.min(12, Number(count) || 1));
  const current = getCourts(t);
  const courts = [];
  for (let i = 0; i < n; i++) courts.push(current[i] || { id: String(i + 1), label: String(i + 1), n: i + 1, liveId: null, nextId: null, finished: null });
  return { ...t, courts: courts.map((c, i) => ({ ...c, n: i + 1 })), liveId: null, nextId: null };
}

function parseCourtLabels(txt) {
  const labels = String(txt || "")
    .split(/[,;\n]+/)
    .map(s => s.trim())
    .filter(Boolean);
  const seen = new Set();
  return labels.filter(l => {
    const k = l.toLowerCase();
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  }).slice(0, 12);
}

function withCourtLabels(t, labelsText) {
  const labels = parseCourtLabels(labelsText);
  if (!labels.length) return t;
  const current = getCourts(t);
  const courts = labels.map((label, i) => {
    const prev = current.find(c => courtLabel(c).toLowerCase() === label.toLowerCase()) || current[i];
    return {
      id: label,
      label,
      n: i + 1,
      liveId: prev?.liveId || null,
      nextId: prev?.nextId || null,
      finished: prev?.finished || null
    };
  });
  return { ...t, courts, liveId: null, nextId: null };
}

function setCourtGame(t, courtId, slot, key) {
  const k = key ? normalizeGameKey(key) : null;
  const id = String(courtId);
  const courts = getCourts(t).map(c => ({ ...c }));
  let c = courts.find(x => String(x.id) === id || courtLabel(x) === id);
  if (!c) { c = { id, label: id, n: courts.length + 1, liveId: null, nextId: null }; courts.push(c); }
  const field = slot === "live" ? "liveId" : "nextId";
  c[field] = c[field] === k ? null : k;
  if (field === "liveId" && c[field]) c.finished = null;
  return { ...t, courts: courts.map((c, i) => ({ ...c, n: i + 1 })), liveId: null, nextId: null };
}

function clearCourts(t) {
  return { ...t, courts: getCourts(t).map((c, i) => ({ ...c, n: i + 1, liveId: null, nextId: null })), liveId: null, nextId: null };
}

function courtAssignmentsFor(t, key) {
  const k = normalizeGameKey(key);
  const live = [], next = [];
  getCourts(t).forEach(c => {
    if (normalizeGameKey(c.liveId) === k) live.push(courtLabel(c));
    if (normalizeGameKey(c.nextId) === k) next.push(courtLabel(c));
  });
  return { live, next };
}

function firstCourtAssignment(t, key) {
  const a = courtAssignmentsFor(t, key);
  if (a.live.length) return { type: "live", courts: a.live };
  if (a.next.length) return { type: "next", courts: a.next };
  return null;
}

function selectedGamesByCourt(games, t) {
  return getCourts(t).map(c => ({
    ...c,
    liveGame: selectedGame(games, c.liveId),
    nextGame: selectedGame(games, c.nextId),
    finishedGame: c.finished || null
  }));
}

function applyPatchToGame(g, patch) {
  return { ...g, ...patch };
}

function updateGameByKey(t, key, patch) {
  const k = normalizeGameKey(key);
  if (!t || !k) return t;
  if (t.fmt === "sg") {
    return { ...t, games: (t.games||[]).map(g => normalizeGameKey(`sg-${g.id}`) === k || normalizeGameKey(`Grupo-${g.id}`) === k ? applyPatchToGame(g, patch) : g) };
  }
  if (t.fmt === "mg") {
    const groups = {};
    Object.entries(t.groups||{}).forEach(([gk, grp]) => {
      groups[gk] = { ...grp, games: (grp.games||[]).map(g => normalizeGameKey(`g-${gk}-${g.id}`) === k ? applyPatchToGame(g, patch) : g) };
    });
    let nt = { ...t, groups };
    if (Array.isArray(t.brk)) nt = { ...nt, brk: updateBracketByKey(t.brk, k, patch, "br") };
    return nt;
  }
  if (t.fmt === "se") {
    let nt = { ...t, brk: updateBracketByKey(t.brk||[], k, patch, "se") };
    if (k === "tp") nt = { ...nt, tp: applyPatchToGame(nt.tp||{}, patch) };
    return nt;
  }
  if (t.fmt === "sw") {
    return { ...t, curG: (t.curG||[]).map(g => normalizeGameKey(`Rodada ${t.round}-${g.id}`) === k || normalizeGameKey(`sg-${g.id}`) === k ? applyPatchToGame(g, patch) : g) };
  }
  if (k === "final-3") return { ...t, finals:{ ...(t.finals||{}), thirdGame: applyPatchToGame(t.finals?.thirdGame||{}, patch) } };
  if (k === "final-f") return { ...t, finals:{ ...(t.finals||{}), finalGame: applyPatchToGame(t.finals?.finalGame||{}, patch) } };
  return t;
}

function updateBracketByKey(brk, k, patch, prefix) {
  return (brk||[]).map(r => ({ ...r, games:(r.games||[]).map((g,i) => normalizeGameKey(`${prefix}-${r.rn}-${i}`) === k ? applyPatchToGame(g, patch) : g) }));
}

function updateRefScore(t, key, sA, sB) {
  return updateGameByKey(t, key, { sA: toScoreOrNull(sA), sB: toScoreOrNull(sB), status: "live" });
}

function getTimeoutState(g) {
  return g?.timeouts || { aUsed:false, bUsed:false, active:null };
}

function timeoutRemainingSeconds(g) {
  const ts = getTimeoutState(g);
  if (!ts.active || !ts.active.startedAt) return null;
  const duration = Number(ts.active.duration || 60);
  const elapsed = Math.floor((Date.now() - Number(ts.active.startedAt)) / 1000);
  return Math.max(0, duration - elapsed);
}

function timeoutIsActive(g) {
  const rem = timeoutRemainingSeconds(g);
  return rem !== null && rem > 0;
}

function timeoutIsExpired(g) {
  const rem = timeoutRemainingSeconds(g);
  return rem !== null && rem <= 0;
}

function formatTimer(sec) {
  const s = Math.max(0, Number(sec) || 0);
  const m = Math.floor(s / 60);
  const r = String(s % 60).padStart(2, "0");
  return `${m}:${r}`;
}

function startTechnicalTimeout(t, key, side) {
  const games = getAllGames(t);
  const g = selectedGame(games, key);
  const current = getTimeoutState(g);
  const usedField = side === "a" ? "aUsed" : "bUsed";
  if (current[usedField]) return t;
  if (timeoutIsActive(g)) return t;
  const next = {
    ...current,
    [usedField]: true,
    active: { side, startedAt: Date.now(), duration: 60 }
  };
  return updateGameByKey(t, key, { timeouts: next });
}

function renderTechnicalTimeoutPanel(t, key, g) {
  const ts = getTimeoutState(g);
  const active = ts.active || null;
  const remaining = timeoutRemainingSeconds(g);
  const panel = div("ref-timeout-panel");
  panel.appendChild(el("div", {"class":"ref-timeout-title"}, "TEMPO TÉCNICO"));

  // Exibe o destaque do tempo técnico somente enquanto o relógio está correndo.
  // Ao chegar em 0, a equipe permanece bloqueada pelo campo aUsed/bUsed,
  // mas o alerta sai da tela para não ficar permanentemente em destaque.
  if (active && remaining !== null && remaining > 0) {
    const sideName = active.side === "a" ? safeText(g.a) : safeText(g.b);
    const box = div("ref-timeout-active");
    box.appendChild(el("div", {"class":"ref-timeout-label"}, `Tempo de ${sideName}`));
    box.appendChild(el("div", {"class":"ref-timeout-clock"}, formatTimer(remaining)));
    panel.appendChild(box);
  }

  const row = div("ref-timeout-actions");
  [
    {side:"a", name:safeText(g.a), used:!!ts.aUsed},
    {side:"b", name:safeText(g.b), used:!!ts.bUsed}
  ].forEach(item => {
    const disabled = item.used || timeoutIsActive(g);
    const b = el("button", {
      "class":"ref-timeout-btn" + (item.used ? " used" : ""),
      disabled: disabled ? "disabled" : null,
      onClick:(ev)=>{
        ev?.stopPropagation?.();
        if (disabled) return;
        persistTournament(startTechnicalTimeout(t, key, item.side));
      }
    }, item.used ? `${item.name}: usado` : `⏱ ${item.name}`);
    row.appendChild(b);
  });
  panel.appendChild(row);
  return panel;
}


function isSetSport(r) {
  r = r || {};
  return r.matchMode === "sets" || r.sport === "volei" || r.sport === "voleipraia" || r.sport === "futevolei";
}

function isSetSportTournament(t) {
  const r = t?.rules || {};
  return r.matchMode === "sets" || r.sport === "volei" || r.sport === "voleipraia" || r.sport === "futevolei";
}

function maxSetsForTournament(t) {
  const setsToWin = Number(t?.rules?.setsToWin || 2);
  return Math.max(1, setsToWin * 2 - 1);
}

function setTargetForIndex(t, setIndex) {
  const maxSets = maxSetsForTournament(t);
  const normal = Number(t?.rules?.pointsPerSet || 25);
  const tie = Number(t?.rules?.tieBreakPoints || 15);
  return Number(setIndex) === maxSets ? tie : normal;
}

function getSetState(g, t) {
  const sets = Array.isArray(g?.sets) ? g.sets : [];
  let aSets = 0, bSets = 0;
  sets.forEach(st => {
    const a = Number(st?.a ?? 0), b = Number(st?.b ?? 0);
    if (a > b) aSets++; else if (b > a) bSets++;
  });
  const currentSet = Math.min(maxSetsForTournament(t), Math.max(1, Number(g?.currentSet || sets.length + 1)));
  return { sets, aSets, bSets, currentSet, setsToWin:Number(t?.rules?.setsToWin || 2) };
}

function canCloseSetScore(t, setNumber, a, b) {
  const pa = Number(a), pb = Number(b);
  if (!Number.isFinite(pa) || !Number.isFinite(pb)) return { ok:false, msg:"Informe o placar do set." };
  if (pa === pb) return { ok:false, msg:"O set não pode terminar empatado." };
  const target = setTargetForIndex(t, setNumber);
  const max = Math.max(pa, pb), diff = Math.abs(pa - pb);
  if (max < target) return { ok:false, msg:`O set ${setNumber} precisa chegar a ${target} pontos.` };
  if (diff < 2) return { ok:false, msg:"É necessário ter pelo menos 2 pontos de vantagem." };
  return { ok:true, msg:"" };
}

function setScoreSummary(g, t) {
  const st = getSetState(g, t);
  if (!st.sets.length) return `${st.aSets} × ${st.bSets} em sets`;
  const parts = st.sets.map((x,i)=>`S${i+1}: ${safeScore(x.a)}–${safeScore(x.b)}`);
  return `${st.aSets} × ${st.bSets} em sets · ${parts.join(" · ")}`;
}

function closeCurrentSetOrMatch(t, courtId, key, sA, sB) {
  if (!isSetSportTournament(t)) return finishCourtGameScoreMode(t, courtId, key, sA, sB);
  const games = getAllGames(t);
  const g = selectedGame(games, key) || {};
  const state = getSetState(g, t);
  const check = canCloseSetScore(t, state.currentSet, sA, sB);
  if (!check.ok) { alert(check.msg); return t; }

  const newSet = { n: state.currentSet, a: toScoreOrNull(sA), b: toScoreOrNull(sB), closedAt: Date.now() };
  const newSets = [...state.sets, newSet];
  let aSets = state.aSets + (Number(sA) > Number(sB) ? 1 : 0);
  let bSets = state.bSets + (Number(sB) > Number(sA) ? 1 : 0);
  const matchFinished = aSets >= state.setsToWin || bSets >= state.setsToWin;

  if (matchFinished) {
    let nt = updateGameByKey(t, key, {
      sets: newSets,
      currentSet: state.currentSet,
      sA: aSets,
      sB: bSets,
      status: "finished",
      finishedAt: Date.now()
    });
    return promoteNextCourtGame(nt, courtId, key, aSets, bSets);
  }

  return updateGameByKey(t, key, {
    sets: newSets,
    currentSet: state.currentSet + 1,
    sA: 0,
    sB: 0,
    status: "live"
  });
}

function promoteNextCourtGame(t, courtId, key, sA, sB) {
  const gamesAfterFinish = getAllGames(t);
  const finishedGame = selectedGame(gamesAfterFinish, key) || {};
  let promotedNextKey = null;

  const courts = getCourts(t).map((c, i) => {
    if (String(c.id) !== String(courtId)) return { ...c, n: i + 1 };
    promotedNextKey = c.nextId ? normalizeGameKey(c.nextId) : null;
    return {
      ...c,
      n: i + 1,
      liveId: promotedNextKey,
      nextId: null,
      finished: {
        key: normalizeGameKey(key),
        a: finishedGame.a,
        b: finishedGame.b,
        sA: toScoreOrNull(sA),
        sB: toScoreOrNull(sB),
        sets: finishedGame.sets || [],
        ctx: finishedGame.ctx,
        endedAt: Date.now()
      }
    };
  });

  if (promotedNextKey) t = updateGameByKey(t, promotedNextKey, { status: "live", sA:0, sB:0, currentSet:1, sets:[] });
  return { ...t, courts, liveId:null, nextId:null };
}

function finishCourtGameScoreMode(t, courtId, key, sA, sB) {

  let nt = updateGameByKey(t, key, { sA: toScoreOrNull(sA), sB: toScoreOrNull(sB), status: "finished", finishedAt: Date.now() });
  const gamesAfterFinish = getAllGames(nt);
  const finishedGame = selectedGame(gamesAfterFinish, key) || {};
  let promotedNextKey = null;

  const courts = getCourts(nt).map((c, i) => {
    if (String(c.id) !== String(courtId)) return { ...c, n: i + 1 };
    promotedNextKey = c.nextId ? normalizeGameKey(c.nextId) : null;
    return {
      ...c,
      n: i + 1,
      liveId: promotedNextKey,
      nextId: null,
      finished: {
        key: normalizeGameKey(key),
        a: finishedGame.a,
        b: finishedGame.b,
        sA: toScoreOrNull(sA),
        sB: toScoreOrNull(sB),
        ctx: finishedGame.ctx,
        endedAt: Date.now()
      }
    };
  });

  // Ao encerrar uma partida, o próximo jogo daquela quadra sobe automaticamente
  // para "Em Quadra", já disponível para atribuição de placar pela Arbitragem.
  if (promotedNextKey) {
    nt = updateGameByKey(nt, promotedNextKey, { status: "live" });
  }

  return { ...nt, courts, liveId:null, nextId:null };
}

function getAllGames(t) {
  if (!t) return [];
  const res = [];
  const push=(g,ctx,key)=>{
    if (!g) return;
    res.push({...g,ctx,key:key||`${ctx}-${g.id}`});
  };
  // As chaves precisam ser exatamente as mesmas usadas na lista de jogos;
  // caso contrário, o jogo selecionado em Quadra/Próximo não aparece no Público.
  if(t.fmt==="sg") t.games?.forEach(g=>push(g,"Grupo",`sg-${g.id}`));
  if(t.fmt==="mg"||t.fmt==="mgk"){
    Object.entries(t.groups||{}).forEach(([k,grp])=>grp.games.forEach(g=>push(g,k,`g-${k}-${g.id}`)));
    t.brk?.forEach(r=>r.games.forEach((g,i)=>push(g,r.name,`br-${r.rn}-${i}`)));
  }
  if(t.fmt==="se"){
    t.brk?.forEach(r=>r.games.forEach((g,i)=>push(g,r.name,`se-${r.rn}-${i}`)));
    if(t.tp) push({...t.tp,id:"TP"},"3º Lugar","tp");
  }
  if(t.fmt==="sw"){
    t.curG?.forEach(g=>push(g,`Rodada ${t.round}`,`sw-cur-${g.id}`));
    t.allG?.forEach(g=>push(g,"Anteriores",`sw-all-${g.id}`));
  }
  if(t.finals?.thirdGame) push({...t.finals.thirdGame,id:"F3"},"3º Lugar","final-3");
  if(t.finals?.finalGame) push({...t.finals.finalGame,id:"FF"},"Final 🏆","final-f");
  return res;
}

function parseText(txt) {
  const lines=txt.split("\n").map(l=>l.trim()).filter(Boolean);
  let title="",fmt="sg",qpg=2,swR=4;
  const groups={}; let allT=[];
  lines.forEach(l=>{
    const lo=l.toLowerCase();
    if(lo.match(/t[íi]tulo\s*:/)) title=l.replace(/t[íi]tulo\s*:/i,"").trim();
    if(lo.includes("mata-mata")||lo.includes("chaveamento")) fmt="se";
    if(lo.includes("suíço")||lo.includes("suico")||lo.includes("swiss")) fmt="sw";
    if(lo.match(/grupo[^:]*:/)){
      const k=(l.match(/grupo[^:]+/i)?.[0]||"Grupo").trim().toUpperCase();
      const ts=l.replace(/grupo[^:]+:/i,"").split(",").map(s=>s.trim()).filter(Boolean);
      if(lo.includes("único")||lo.includes("unico")){allT.push(...ts);fmt="sg";}
      else groups[k]=ts;
    }
    if(lo.includes("equipes:")||lo.includes("participantes:"))
      allT.push(...l.replace(/equipes:|participantes:/i,"").split(",").map(s=>s.trim()).filter(Boolean));
    const rm=lo.match(/rodadas?\s*[:\-]?\s*(\d+)/);if(rm)swR=+rm[1];
  });
  if(Object.keys(groups).length>=2) fmt="mg";
  return{title,fmt,groups,allT,qpg,swR};
}

function buildTournament(p) {
  const rules = {...defaultRulesForSport(p.sport || p.rules?.sport || "futebol"), ...(p.rules||{}), format:p.fmt, teamCount:(p.allT?.length||Object.values(p.groups||{}).flat().length||0), groupCount:Object.keys(p.groups||{}).length||Number(p.groupCount)||0, qualifiersPerGroup:Number(p.qpg)||2, bracketRules:{ enabled:true, bracketSize:"auto", byeStrategy:"topSeeds", seedingSource:"overall", avoidSameGroupFirstRound:true, avoidSameGroupUntil:"semifinal", ...((p.rules||{}).bracketRules||{}) }};
  const base={title:p.title,description:p.description||"",fmt:p.fmt,rules,liveId:null,nextId:null,courts:[{id:"1",label:"1",n:1,liveId:null,nextId:null}],awards:[],votes:{},votingOpen:false,createdAt:Date.now()};
  if(p.fmt==="sg") return{...base,teams:p.allT,games:roundRobin(p.allT),finals:null};
  if(p.fmt==="mg"){
    const sourceGroups = {...(p.groups||{})};
    if(Object.keys(sourceGroups).length===0 && Array.isArray(p.allT) && p.allT.length>=2){
      const mid = Math.ceil(p.allT.length/2);
      sourceGroups["GRUPO A"] = p.allT.slice(0, mid);
      sourceGroups["GRUPO B"] = p.allT.slice(mid);
    }
    const gd={};Object.entries(sourceGroups).forEach(([k,t])=>{gd[k]={teams:t,games:roundRobin(t)};});
    return{...base,groups:gd,qpg:p.qpg,brk:null};
  }
  if(p.fmt==="se"){
    const t=p.allT.length?p.allT:Object.values(p.groups).flat();
    return{...base,teams:t,brk:buildBracket(t, rules.bracketRules||{}),tp:rules.includeThirdPlace===false?null:{sA:null,sB:null}};
  }
  if(p.fmt==="sw"){
    const t=p.allT.length?p.allT:Object.values(p.groups).flat();
    return{...base,teams:t,swR:p.swR,round:1,allG:[],curG:swissPair(t,[],calcStats(t,[],base.rules))};
  }
  return base;
}


function qualifiedSeedsForTournament(t) {
  if (!t || t.fmt !== "mg" || !t.groups) return [];
  const gkeys = Object.keys(t.groups || {});
  const q = Number(t.qpg || t.rules?.qualifiersPerGroup || 2);
  const rows = [];
  gkeys.forEach(k => {
    const ranking = calcStats(t.groups[k].teams || [], t.groups[k].games || [], t.rules);
    ranking.slice(0, q).forEach(r => rows.push({ ...r, group:k }));
  });
  return rows.sort((a,b)=>{
    const setSport = isSetSport(t.rules);
    return setSport
      ? (b.w-a.w || b.setDiff-a.setDiff || b.diff-a.diff || b.gf-a.gf || String(a.team).localeCompare(String(b.team)))
      : (b.pts-a.pts || b.w-a.w || b.diff-a.diff || b.gf-a.gf || String(a.team).localeCompare(String(b.team)));
  }).map((r,i)=>({ team:r.team, group:r.group, seed:i+1 }));
}

function eliminationHasResults(brk) {
  return (brk || []).some(r => (r.games || []).some(g => hasScorePair(g.sA, g.sB) || (Array.isArray(g.sets) && g.sets.length)));
}

function rebuildDerivedElimination(t, reason) {
  if (!t || t.fmt !== "mg" || !t.brk) return t;
  const seeds = qualifiedSeedsForTournament(t);
  if (!seeds.length) return t;
  const hadResults = eliminationHasResults(t.brk);
  return {
    ...t,
    brk: (() => {
      const nb = buildBracket(seeds, t.rules?.bracketRules || {});
      (t.brk||[]).forEach((old,i)=>{ if(nb[i] && old.name) nb[i].name = old.name; });
      return nb;
    })(),
    tp: t.rules?.includeThirdPlace === false ? null : (t.tp || {sA:null,sB:null}),
    bracketUpdatedAt: Date.now(),
    bracketUpdatedReason: reason || "Classificação recalculada",
    bracketHadResultsBeforeRebuild: hadResults
  };
}

function persistTournamentWithDerived(t, reason) {
  persistTournament(rebuildDerivedElimination(t, reason));
}

function deriveSetPatchFromInputs(g, t, setPairs) {
  const sets = [];
  for (let i = 0; i < setPairs.length; i++) {
    const a = toScoreOrNull(setPairs[i].a);
    const b = toScoreOrNull(setPairs[i].b);
    if (a === null && b === null) continue;
    if (a === null || b === null) continue;
    sets.push({ n:i+1, a, b, closedAt:g?.sets?.[i]?.closedAt || Date.now() });
  }
  let aSets = 0, bSets = 0;
  sets.forEach(st => { if (Number(st.a) > Number(st.b)) aSets++; else if (Number(st.b) > Number(st.a)) bSets++; });
  const setsToWin = Number(t?.rules?.setsToWin || 2);
  const finished = aSets >= setsToWin || bSets >= setsToWin;
  return {
    sets,
    currentSet: finished ? Math.max(1, sets.length) : Math.min(maxSetsForTournament(t), sets.length + 1),
    // Para modalidades por sets, sA/sB armazenam a parcial de sets vencidos.
    // Isso mantém a tela, a classificação e a fase eliminatória coerentes após edição manual pelo Admin.
    sA: sets.length ? aSets : null,
    sB: sets.length ? bSets : null,
    status: finished ? "finished" : (sets.length ? "live" : "pending"),
    finishedAt: finished ? (g?.finishedAt || Date.now()) : null
  };
}

async function persistTournament(t) {
  const now = Date.now();
  let id = STATE.selectedTournamentId;
  if (!id) {
    id = makeTournamentId();
    STATE.selectedTournamentId = id;
  }
  const prev = STATE.tournaments?.[id] || {};
  if (t === null) {
    // Na versão multi, Encerrar não apaga: apenas muda o status.
    const kept = prev.tournament || STATE.tournament;
    STATE.tournaments = { ...(STATE.tournaments||{}), [id]: { ...prev, id, title: kept?.title || prev.title || "Torneio", status:"encerrado", tournament: kept, updatedAt: now } };
    STATE.tournament = kept || null;
    STATE.lastUpdated = now;
    render();
    await saveMultiStore();
    return;
  }
  STATE.tournament = t;
  STATE.lastUpdated = now;
  STATE.tournaments = { ...(STATE.tournaments||{}), [id]: { ...prev, id, title: t.title || prev.title || "Torneio", status: prev.status || "ativo", tournament: t, updatedAt: now } };
  render();
  await saveMultiStore();
}

let pollInterval = null;
function shouldDeferPollingRender() {
  // Enquanto o Admin está aberto, o polling não deve redesenhar nem sobrescrever o estado.
  // Em especial na aba Criar, qualquer render automático recria os inputs e apaga o texto digitado.
  return (STATE.view === "admin" && STATE.adminUnlocked) || (STATE.view === "ref" && STATE.refUnlocked);
}

async function startPolling() {
  const data = normalizeMultiData(await dbLoad());
  STATE.tournaments = data.tournaments || {};
  if (!STATE.selectedTournamentId) {
    const first = tournamentEntries("ativo")[0] || tournamentEntries("all")[0];
    if (first) { STATE.selectedTournamentId = first.id; STATE.tournament = first.tournament; STATE.lastUpdated = first.updatedAt; }
  } else if (STATE.tournaments[STATE.selectedTournamentId]) {
    const rec = STATE.tournaments[STATE.selectedTournamentId];
    STATE.tournament = rec.tournament; STATE.lastUpdated = rec.updatedAt;
  }
  if (!shouldDeferPollingRender()) render();

  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(async () => {
    if (shouldDeferPollingRender()) return;
    const d = normalizeMultiData(await dbLoad());
    STATE.tournaments = d.tournaments || {};
    if (STATE.selectedTournamentId && STATE.tournaments[STATE.selectedTournamentId]) {
      const rec = STATE.tournaments[STATE.selectedTournamentId];
      STATE.tournament = rec.tournament; STATE.lastUpdated = rec.updatedAt;
    } else {
      const first = tournamentEntries("ativo")[0] || tournamentEntries("all")[0];
      STATE.selectedTournamentId = first?.id || null;
      STATE.tournament = first?.tournament || null;
      STATE.lastUpdated = first?.updatedAt || null;
    }
    render();
  }, 4000);
}
startPolling();

function winner(sA, sB, a, b) {
  if (!hasScorePair(sA, sB)) return null;
  return +sA>+sB?a:+sB>+sA?b:null;
}
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  Object.entries(attrs||{}).forEach(([k,v])=>{
    if (v === null || v === undefined || v === false) return;
    if (k==="class") e.className=v;
    else if (k==="style") Object.assign(e.style, v);
    else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v === true) e.setAttribute(k, k);
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{
    if (c===null||c===undefined) return;
    e.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}
function div(cls, attrsOrChild, ...children){
  const attrs = {"class": cls};
  if (attrsOrChild && typeof attrsOrChild === "object" && !(attrsOrChild instanceof Node) && !Array.isArray(attrsOrChild)) {
    Object.assign(attrs, attrsOrChild);
  } else if (attrsOrChild !== undefined) {
    children.unshift(attrsOrChild);
  }
  return el("div", attrs, ...children);
}
function span(cls,txt){ return el("span",{"class":cls},safeText(txt)); }
function btn(cls,txt,onclick){ return el("button",{"class":"btn "+cls,onClick:onclick},txt); }

function isMissing(v) {
  return v === null || v === undefined || (typeof v === "number" && Number.isNaN(v));
}
function isValidNumber(v) {
  if (v === null || v === undefined || v === "") return false;
  const n = Number(v);
  return Number.isFinite(n);
}
function hasScorePair(a, b) {
  return isValidNumber(a) && isValidNumber(b);
}
function safeText(v) {
  if (isMissing(v)) return "-";
  if (typeof v === "number" && !Number.isFinite(v)) return "-";
  const txt = String(v);
  if (txt === "undefined" || txt === "null" || txt === "NaN") return "-";
  return txt;
}
function safeScore(v) {
  return isValidNumber(v) ? String(Number(v)) : "-";
}
function safeInputValue(v) {
  return isValidNumber(v) ? String(Number(v)) : "";
}
function toScoreOrNull(v) {
  return isValidNumber(v) ? Number(v) : null;
}

function scorePatch(field, val) {
  if ((field === "__score" || field === "__patch") && val && typeof val === "object") {
    if (field === "__patch") return { ...val };
    return {
      sA: toScoreOrNull(val.sA),
      sB: toScoreOrNull(val.sB)
    };
  }
  return { [field]: toScoreOrNull(val) };
}

function uniqueTeams(t) {
  const teams = [];
  if (t?.teams) teams.push(...t.teams);
  if (t?.groups) Object.values(t.groups).forEach(g => teams.push(...(g.teams || [])));
  return [...new Set(teams.filter(Boolean))];
}


function isValidTournament(t) {
  if (!t || typeof t !== "object") return false;
  if (!t.title || typeof t.title !== "string") return false;
  if (!["sg", "mg", "se", "sw"].includes(t.fmt)) return false;
  if (t.fmt === "sg") return Array.isArray(t.teams) && Array.isArray(t.games);
  if (t.fmt === "mg") return t.groups && typeof t.groups === "object" && Object.keys(t.groups).length > 0;
  if (t.fmt === "se") return Array.isArray(t.teams) && Array.isArray(t.brk);
  if (t.fmt === "sw") return Array.isArray(t.teams) && Array.isArray(t.curG);
  return false;
}

function renderBrokenTournamentNotice(t) {

  }
}

function renderPinScreen(mode="admin") {
  const wrap = div("pin-wrap");
  const box = div("pin-box");
  box.appendChild(el("div",{"class":"pin-title"},mode==="ref"?"ARBITRAGEM":"ADMIN"));
  box.appendChild(el("div",{"class":"pin-sub"},"Digite o PIN de 4 dígitos"));

  const dots = div("pin-dots");
  for(let i=0;i<4;i++){
    const d = div("pin-dot" + (i<(mode==="ref"?STATE.refPinInput:STATE.pinInput).length?" filled":"") + ((mode==="ref"?STATE.refPinError:STATE.pinError)?" error":""));
    dots.appendChild(d);
  }
  box.appendChild(dots);

  const grid = div("pin-grid");
  const keys = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
  keys.forEach(k=>{
    if(k===""){grid.appendChild(div("pin-key"));return;}
    const btn = el("div",{"class":"pin-key"+(k==="⌫"?" del":""),onClick:()=>handlePin(k, mode)},k);
    grid.appendChild(btn);
  });
  box.appendChild(grid);

  const errEl = div("pin-err");
  if(mode==="ref" ? STATE.refPinError : STATE.pinError) errEl.textContent="PIN incorreto. Tente novamente.";
  box.appendChild(errEl);
  wrap.appendChild(box);
  return wrap;
}

function handlePin(k, mode="admin") {
  const isRef = mode === "ref";
  const inputKey = isRef ? "refPinInput" : "pinInput";
  const errorKey = isRef ? "refPinError" : "pinError";
  const expected = isRef ? REF_PIN : ADMIN_PIN;

  if(k==="⌫"){
    setState({[inputKey]:STATE[inputKey].slice(0,-1),[errorKey]:false});
    return;
  }
  const next = STATE[inputKey] + k;
  if(next.length<4){ setState({[inputKey]:next,[errorKey]:false}); return; }
  if(next===expected){
    if(isRef) setState({refUnlocked:true,refPinInput:"",refPinError:false,view:"ref"});
    else setState({adminUnlocked:true,pinInput:"",pinError:false,view:"admin",adminTab:STATE.tournament?"manage":"create"});
  } else {
    setState({[inputKey]:"",[errorKey]:true});
    setTimeout(()=>setState({[errorKey]:false}),800);
  }
}

function getTournamentTeamCount(t) {
  if (!t) return 0;
  if (Array.isArray(t.teams)) return t.teams.length;
  if (t.groups) return Object.values(t.groups).reduce((acc, g) => acc + ((g.teams||[]).length), 0);
  return Number(t.rules?.teamCount || 0) || 0;
}

function getTournamentGroupCount(t) {
  if (!t) return 0;
  if (t.fmt === "sg" || t.fmt === "se" || t.fmt === "sw") return 1;
  if (t.groups) return Object.keys(t.groups).length;
  return Number(t.rules?.groupCount || 0);
}

function getSetSummary(t) {
  const r = t?.rules || {};
  if (!isSetSport(r)) return null;
  const maxSets = Math.max(1, Number(r.setsToWin || 2) * 2 - 1);
  return `Melhor de ${maxSets} (${safeText(r.setsToWin)} set${Number(r.setsToWin||0)===1?"":"s"} para vencer)`;
}

function getTieBreakSummary(t) {
  const r = t?.rules || {};
  if (!isSetSport(r)) return null;
  return `Set regular até ${safeText(r.pointsPerSet)} pontos com 2 de vantagem; tie-break até ${safeText(r.tieBreakPoints || 15)} com 2 de vantagem.`;
}

    item.appendChild(el("div", {style:{fontSize:"13px", fontWeight:"700", color:"var(--text)"}}, safeText(value)));

  return grid;
}

  const r = t?.rules || {};

function renderRefCourt(c, t) {
  const g = c.liveGame;
  const card = div("ref-card");

  if (!g) {
    if (c.finishedGame) {

      const done = div("ref-next");
      done.appendChild(el("div", {"class":"ref-next-label"}, "ÚLTIMO JOGO ENCERRADO"));

  }

  const key = normalizeGameKey(c.liveId || g.key);
  card.appendChild(el("div", {"class":"ref-context"}, safeText(g.ctx)));
  if (isSetSportTournament(t)) {
    const ss = getSetState(g, t);

      card.appendChild(prev);
    }
  }

  const score = div("ref-scoreboard");
  const left = div("ref-team");
  const right = div("ref-team");
  const sA = isValidNumber(g.sA) ? Number(g.sA) : 0;

  left.appendChild(el("div", {"class":"ref-team-name"}, safeText(g.a)));

  left.appendChild(el("div", {"class":"ref-points"}, safeScore(sA)));
  left.appendChild(el("button", {"class":"ref-minus", onClick:(ev)=>{ ev?.stopPropagation?.(); persistTournament(updateRefScore(t, key, Math.max(0, sA - 1), sB)); }}, "−"));

  right.appendChild(el("div", {"class":"ref-team-name"}, safeText(g.b)));
  right.appendChild(el("button", {"class":"ref-plus", onClick:(ev)=>{ ev?.stopPropagation?.(); persistTournament(updateRefScore(t, key, sA, sB + 1)); }}, "+"));
  right.appendChild(el("div", {"class":"ref-points"}, safeScore(sB)));
  right.appendChild(el("button", {"class":"ref-minus", onClick:(ev)=>{ ev?.stopPropagation?.(); persistTournament(updateRefScore(t, key, sA, Math.max(0, sB - 1))); }}, "−"));

  score.appendChild(left); score.appendChild(vs); score.appendChild(right);

  card.appendChild(actions);

  if(c.nextGame){

    nx.appendChild(el("div", {"class":"ref-next-game"}, `${safeText(c.nextGame.a)} × ${safeText(c.nextGame.b)}`));

  }
  return card;
}

function splitTeamsIntoGroups(teams, groupCount) {
  const groups = {};
  const n = Math.max(1, Number(groupCount || 1));
  for (let i = 0; i < n; i++) groups[`GRUPO ${String.fromCharCode(65+i)}`] = [];
  (teams || []).forEach((tm, i) => groups[`GRUPO ${String.fromCharCode(65+(i % n))}`].push(tm));
  return groups;
}

function normalizeGroupCountForFormat(fmt, groupCount) {
  if (fmt === "sg" || fmt === "se" || fmt === "sw") return 1;
  return Math.max(2, Number(groupCount || 2));
}

function normalizeQpgForFormat(fmt, qpg) {
  if (fmt === "sg" || fmt === "se" || fmt === "sw") return 0;
  return Math.max(1, Number(qpg || 2));
}

function buildEditedTournamentFromForm(t, cfg) {
  const teams = parseCandidatesText(cfg.teamsText || "").filter(Boolean);
  const fmt = cfg.fmt || t.fmt || "sg";
  const groupCount = normalizeGroupCountForFormat(fmt, cfg.groupCount || t.rules?.groupCount || getTournamentGroupCount(t) || 2);
  const qpg = normalizeQpgForFormat(fmt, cfg.qpg || t.qpg || t.rules?.qualifiersPerGroup || 2);
  const sport = cfg.sport || t.rules?.sport || "futebol";
  const setSport = sport === "volei" || sport === "voleipraia" || sport === "futevolei";
  const baseRules = defaultRulesForSport(sport);
  const rules = {
    ...baseRules,
    ...(t.rules || {}),
    sport,
    format: fmt,
    teamCount: teams.length,
    groupCount: fmt === "mg" ? groupCount : 1,
    qualifiersPerGroup: fmt === "mg" ? qpg : 0,
    includeThirdPlace: cfg.includeThirdPlace !== false
  };
  if (setSport) {
    rules.matchMode = "sets";
    rules.setsToWin = Number(cfg.setsToWin || rules.setsToWin || 2);
    rules.pointsPerSet = Number(cfg.pointsPerSet || rules.pointsPerSet || 25);
    rules.tieBreakPoints = Number(cfg.tieBreakPoints || rules.tieBreakPoints || 15);
  } else {
    rules.matchMode = "score";
    rules.winPoints = Number(cfg.winPoints ?? rules.winPoints ?? 3);
    rules.drawPoints = Number(cfg.drawPoints ?? rules.drawPoints ?? 1);
    rules.lossPoints = Number(cfg.lossPoints ?? rules.lossPoints ?? 0);
  }

  const groups = fmt === "mg" ? splitTeamsIntoGroups(teams, groupCount) : {};
  const rebuilt = buildTournament({
    title: (cfg.title || t.title || "Torneio").trim(),
    description: t.description || "",
    fmt,
    sport,
    rules,
    groups,
    allT: fmt === "mg" ? [] : teams,
    qpg,
    swR: t.swR || 4,
    groupCount
  });

  return {
    ...rebuilt,
    description: t.description || "",
    courts: t.courts || rebuilt.courts,
    awards: t.awards || [],
    votes: t.votes || {},
    votingOpen: !!t.votingOpen,
    createdAt: t.createdAt || rebuilt.createdAt,
    tp: rules.includeThirdPlace === false ? null : (t.tp || {sA:null,sB:null})
  };
}
