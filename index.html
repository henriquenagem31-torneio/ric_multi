  const updateCfg = (patch, shouldRender=false) => {
    Object.assign(cfg, patch);
    STATE.adminEditDraft = cfg;
    if (shouldRender) render();
  };

  const row1 = div("wiz-row");
  const titleWrap = div("");
  titleWrap.appendChild(el("label", {class:"lbl"}, "Nome do torneio"));
  titleWrap.appendChild(el("input", {class:"inp", value:cfg.title, onInput:e=>updateCfg({title:e.target.value})}));
  row1.appendChild(titleWrap);

  const sportWrap = div("");
  sportWrap.appendChild(el("label", {class:"lbl"}, "Modalidade"));
  const sportSel = el("select", {class:"inp", onChange:e=>{
    const sp = e.target.value;
    const r = defaultRulesForSport(sp);
    updateCfg({
      sport: sp,
      setsToWin: r.setsToWin || cfg.setsToWin || 2,
      pointsPerSet: r.pointsPerSet || cfg.pointsPerSet || 25,
      tieBreakPoints: r.tieBreakPoints || cfg.tieBreakPoints || 15,
      winPoints: r.winPoints ?? cfg.winPoints ?? 3,
      drawPoints: r.drawPoints ?? cfg.drawPoints ?? 1,
      lossPoints: r.lossPoints ?? cfg.lossPoints ?? 0
    }, true);
  }});
  [
    ["volei","Vôlei"], ["voleipraia","Vôlei de Praia"], ["futevolei","Futevôlei"], ["futebol","Futebol"], ["futsal","Futsal"]
  ].forEach(([v,l])=>sportSel.appendChild(el("option", {value:v, selected:cfg.sport===v?"selected":null}, l)));
  sportWrap.appendChild(sportSel);
  row1.appendChild(sportWrap);
  card.appendChild(row1);

  const row2 = div("wiz-row");
  const fmtWrap = div("");
  fmtWrap.appendChild(el("label", {class:"lbl"}, "Formato"));
  const fmtSel = el("select", {class:"inp", onChange:e=>{
    const newFmt = e.target.value;
    updateCfg({
      fmt: newFmt,
      groupCount: normalizeGroupCountForFormat(newFmt, cfg.groupCount),
      qpg: normalizeQpgForFormat(newFmt, cfg.qpg)
    }, true);
  }});
  [["sg","Grupo Único"],["mg","Múltiplos Grupos"],["se","Mata-Mata"],["sw","Sistema Suíço"]].forEach(([v,l])=>fmtSel.appendChild(el("option", {value:v, selected:cfg.fmt===v?"selected":null}, l)));
  fmtWrap.appendChild(fmtSel);
  row2.appendChild(fmtWrap);

  const groupIsEditable = cfg.fmt === "mg";
  const gcWrap = div("");
  gcWrap.appendChild(el("label", {class:"lbl"}, "Número de grupos"));
  gcWrap.appendChild(el("input", {
    class:"inp",
    type:"number",
    min: groupIsEditable ? "2" : "1",
    value: normalizeGroupCountForFormat(cfg.fmt, cfg.groupCount),
    disabled: groupIsEditable ? null : "disabled",
    onInput:e=>updateCfg({groupCount:e.target.value})
  }));
  if (!groupIsEditable) gcWrap.appendChild(el("div", {style:{fontSize:"10px",color:"var(--muted)",marginTop:"4px"}}, "Este formato usa 1 grupo lógico."));
  row2.appendChild(gcWrap);

  const qWrap = div("");
  qWrap.appendChild(el("label", {class:"lbl"}, "Classificados por grupo"));
  qWrap.appendChild(el("input", {
    class:"inp",
    type:"number",
    min:"1",
    value: cfg.fmt === "mg" ? normalizeQpgForFormat(cfg.fmt, cfg.qpg) : 0,
    disabled: cfg.fmt === "mg" ? null : "disabled",
    onInput:e=>updateCfg({qpg:e.target.value})
  }));
  if (cfg.fmt !== "mg") qWrap.appendChild(el("div", {style:{fontSize:"10px",color:"var(--muted)",marginTop:"4px"}}, "Não aplicável para este formato."));
  row2.appendChild(qWrap);
  card.appendChild(row2);

  const ruleRow = div("wiz-row");
  const setSport = cfg.sport === "volei" || cfg.sport === "voleipraia" || cfg.sport === "futevolei";
  if (setSport) {
    const s1 = div(""); s1.appendChild(el("label", {class:"lbl"}, "Sets para vencer"));
    s1.appendChild(el("input", {class:"inp", type:"number", min:"1", value:cfg.setsToWin, onInput:e=>updateCfg({setsToWin:e.target.value})})); ruleRow.appendChild(s1);
    const s2 = div(""); s2.appendChild(el("label", {class:"lbl"}, "Pontos por set"));
    s2.appendChild(el("input", {class:"inp", type:"number", min:"1", value:cfg.pointsPerSet, onInput:e=>updateCfg({pointsPerSet:e.target.value})})); ruleRow.appendChild(s2);
    const s3 = div(""); s3.appendChild(el("label", {class:"lbl"}, "Tie-break"));
    s3.appendChild(el("input", {class:"inp", type:"number", min:"1", value:cfg.tieBreakPoints, onInput:e=>updateCfg({tieBreakPoints:e.target.value})})); ruleRow.appendChild(s3);
  } else {
    const p1 = div(""); p1.appendChild(el("label", {class:"lbl"}, "Pontos por vitória"));
    p1.appendChild(el("input", {class:"inp", type:"number", value:cfg.winPoints, onInput:e=>updateCfg({winPoints:e.target.value})})); ruleRow.appendChild(p1);
    const p2 = div(""); p2.appendChild(el("label", {class:"lbl"}, "Pontos por empate"));
    p2.appendChild(el("input", {class:"inp", type:"number", value:cfg.drawPoints, onInput:e=>updateCfg({drawPoints:e.target.value})})); ruleRow.appendChild(p2);
    const p3 = div(""); p3.appendChild(el("label", {class:"lbl"}, "Pontos por derrota"));
    p3.appendChild(el("input", {class:"inp", type:"number", value:cfg.lossPoints, onInput:e=>updateCfg({lossPoints:e.target.value})})); ruleRow.appendChild(p3);
  }
  card.appendChild(ruleRow);

  const third = el("div", {style:{margin:"8px 0 10px", padding:"8px 10px", background:"var(--s1)", border:"1px solid var(--border)", borderRadius:"7px"}});
  const thirdDisabled = !(cfg.fmt === "mg" || cfg.fmt === "se");
  const chk = el("input", {
    type:"checkbox",
    checked:cfg.includeThirdPlace && !thirdDisabled ? "checked" : null,
    disabled:thirdDisabled ? "disabled" : null,
    onChange:e=>updateCfg({includeThirdPlace:e.target.checked})
  });
  third.appendChild(chk);
  third.appendChild(el("span", {style:{marginLeft:"8px", fontSize:"12px"}}, "Incluir disputa de 3º lugar"));
  if (thirdDisabled) third.appendChild(el("div", {style:{fontSize:"10px",color:"var(--muted)",marginTop:"5px"}}, "Disponível apenas para formatos com fase eliminatória."));
  card.appendChild(third);

  card.appendChild(el("label", {class:"lbl"}, "Equipes / Duplas"));
  card.appendChild(el("textarea", {class:"textarea", style:{minHeight:"70px"}, onInput:e=>updateCfg({teamsText:e.target.value})}, cfg.teamsText));

  const fmtChanged = cfg.fmt !== t.fmt;
  const structuralMsg = fmtChanged
    ? "Formato alterado: para aplicar a mudança é necessário usar Recriar estrutura."
    : "Salvar regras/ficha preserva jogos e placares. Recriar estrutura refaz grupos/jogos/chaveamento e reinicia placares.";
  card.appendChild(el("div", {class:fmtChanged?"notice notice-info":"notice notice-info", style:{marginTop:"10px"}}, structuralMsg));

  card.appendChild(el("div", {style:{marginTop:"10px", display:"flex", gap:"8px", flexWrap:"wrap"}},
    btn("btn-primary btn-sm", "Salvar regras/ficha", ()=>{
      const sport = cfg.sport;
      const setSport = sport === "volei" || sport === "voleipraia" || sport === "futevolei";
      const base = defaultRulesForSport(sport);
      const normalizedFmt = t.fmt; // salvar regras não altera estrutura/formato
      const rules = {
        ...base,
        ...(t.rules || {}),
        sport,
        format: normalizedFmt,
        teamCount: getTournamentTeamCount(t),
        groupCount: normalizeGroupCountForFormat(normalizedFmt, getTournamentGroupCount(t)),
        qualifiersPerGroup: normalizedFmt === "mg" ? Number(cfg.qpg || t.qpg || 2) : 0,
        includeThirdPlace: (normalizedFmt === "mg" || normalizedFmt === "se") ? cfg.includeThirdPlace !== false : false
      };
      if (setSport) {
        rules.matchMode = "sets";
        rules.setsToWin = Number(cfg.setsToWin || 2);
        rules.pointsPerSet = Number(cfg.pointsPerSet || 25);
        rules.tieBreakPoints = Number(cfg.tieBreakPoints || 15);
        delete rules.winPoints; delete rules.drawPoints; delete rules.lossPoints;
      } else {
        rules.matchMode = "score";
        rules.winPoints = Number(cfg.winPoints ?? 3);
        rules.drawPoints = Number(cfg.drawPoints ?? 1);
        rules.lossPoints = Number(cfg.lossPoints ?? 0);
        delete rules.setsToWin; delete rules.pointsPerSet; delete rules.tieBreakPoints;
      }
      const updated = {
        ...t,
        title: (cfg.title || t.title || "Torneio").trim(),
        qpg: normalizedFmt === "mg" ? Number(cfg.qpg || t.qpg || 2) : 0,
        rules,
        tp: rules.includeThirdPlace === false ? null : (t.tp || {sA:null,sB:null})
      };
      persistTournamentWithDerived(updated, "Regras/ficha editadas pelo Admin");
      STATE.adminEditDraft = null;
      STATE.adminEditDraftTournamentId = null;
    }),
    btn("btn-danger btn-sm", fmtChanged ? "Aplicar novo formato / recriar estrutura" : "Recriar estrutura", ()=>{
      const msg = fmtChanged
        ? "Alterar formato exige recriar estrutura. Isso reinicia jogos, placares, grupos e chaveamento deste torneio. Continuar?"
        : "Recriar a estrutura vai reiniciar jogos, placares e chaveamento deste torneio. Continuar?";
      if(confirm(msg)){
        const rebuilt = buildEditedTournamentFromForm(t, {
          ...cfg,
          groupCount: normalizeGroupCountForFormat(cfg.fmt, cfg.groupCount),
          qpg: normalizeQpgForFormat(cfg.fmt, cfg.qpg),
          includeThirdPlace: (cfg.fmt === "mg" || cfg.fmt === "se") ? cfg.includeThirdPlace !== false : false
        });
        persistTournament(rebuilt);
        STATE.adminEditDraft = null;
        STATE.adminEditDraftTournamentId = null;
      }
    })
  ));

  return card;
}

function renderAdminManage(t) {
  const wrap = div("");
  const hdr = el("div",{"style":{"display":"flex","justifyContent":"space-between","alignItems":"center","marginBottom":"12px"}});
  const info = div("");
  info.appendChild(el("div",{"style":{"fontWeight":"700","fontSize":"15px"}},t.title));
  info.appendChild(el("div",{"style":{"fontSize":"11px","color":"var(--muted)"}},`${sportLabel(t.rules?.sport)} · ${formatLabel(t.fmt)}`));
  hdr.appendChild(info);
  hdr.appendChild(btn("btn-danger btn-sm","🏁 Encerrar torneio",()=>{ if(confirm("Encerrar este torneio? Ele continuará disponível no filtro Encerrados.")){ persistTournament(null); } }));
  wrap.appendChild(hdr);

  wrap.appendChild(renderTournamentInfoCard(t, true));
  wrap.appendChild(renderAdminTournamentEditCard(t));

  const notesCard = div("card");
  notesCard.appendChild(renderCardHead("Informações adicionais"));
  notesCard.appendChild(el("p", {style:{fontSize:"11px", color:"var(--muted)", marginBottom:"8px"}}, "Texto livre exibido também ao público: regulamento complementar, horários, endereço, premiação, observações do evento etc."));
  const desc = el("textarea", {class:"textarea", style:{minHeight:"80px"}, placeholder:"Ex: Semifinal na quadra central. Aquecimento de 5 minutos. Premiação às 18h..."}, safeText(t.description)==="-"?"":String(t.description||""));
  notesCard.appendChild(desc);
  notesCard.appendChild(el("div", {style:{marginTop:"8px", display:"flex", gap:"8px", flexWrap:"wrap"}},
    btn("btn-primary btn-sm", "Salvar informações", () => persistTournament({...t, description:desc.value.trim()})),
    btn("btn-ghost btn-sm", "Limpar", () => { desc.value=""; persistTournament({...t, description:""}); })
  ));
  if (t.bracketUpdatedAt) {
    notesCard.appendChild(el("div", {class:"notice notice-info", style:{marginTop:"10px"}}, `Chaveamento recalculado em ${new Date(t.bracketUpdatedAt).toLocaleTimeString("pt-BR")} · ${safeText(t.bracketUpdatedReason)}${t.bracketHadResultsBeforeRebuild?" · resultados anteriores da eliminatória foram reiniciados":""}`));
  }
  wrap.appendChild(notesCard);

  const n = div("notice notice-info");
  n.textContent = "No Gerenciar, o administrador pode corrigir placares e sets. Se a classificação mudar e já houver chave eliminatória gerada, a chave será recalculada automaticamente a partir dos novos classificados.";
  wrap.appendChild(n);

  wrap.appendChild(renderTournament(t, false));
  return wrap;
}

function renderCourtPanel(t) {
  const wrap = div("");
  const games = getAllGames(t);
  const courts = getCourts(t);
  const selected = selectedGamesByCourt(games, t);

  wrap.appendChild(renderCourtUsageMap(t));

  const cfg = div("card");
  cfg.appendChild(renderCardHead("Configuração das Quadras"));
  const cfgRow = el("div", { "style": { display:"flex", alignItems:"center", gap:"10px", flexWrap:"wrap" } });
  cfgRow.appendChild(el("label", { "class":"lbl", "style": { marginBottom:"0" } }, "Quadras usadas"));
  const labelsInp = el("input", { "class":"inp", "type":"text", "value": courts.map(courtLabel).join(", "), "placeholder":"Ex: 2, 5, 6, 8", "style": { flex:"1", minWidth:"220px" } });
  cfgRow.appendChild(labelsInp);
  cfgRow.appendChild(btn("btn-ghost btn-sm", "Aplicar", () => persistTournament(withCourtLabels(t, labelsInp.value))));
  cfgRow.appendChild(btn("btn-ghost btn-sm", "✕ Limpar todas", () => persistTournament(clearCourts(t))));
  cfg.appendChild(cfgRow);
  cfg.appendChild(el("p", { "style": { fontSize:"11px", color:"var(--muted)", marginTop:"8px" } }, "Digite os números ou nomes reais das quadras separados por vírgula. Ex.: 2, 5, 6, 8. Cada quadra pode ter um jogo em andamento e um próximo jogo."));
  wrap.appendChild(cfg);

  const statusCard = div("card");
  statusCard.appendChild(renderCardHead("Status por Quadra"));
  const grid = el("div", { "style": { display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))", gap:"8px" } });
  selected.forEach(c => {
    const label = courtLabel(c);
    const box = el("div", { "style": { padding:"10px 12px", background:"var(--s1)", border:"1px solid var(--border)", borderRadius:"8px" } });
    box.appendChild(el("div", { "style": { fontFamily:"var(--display)", fontSize:"16px", letterSpacing:"2px", color:"var(--text)", marginBottom:"8px" } }, `QUADRA ${label}`));
    const liveLine = el("div", { "style": { fontSize:"12px", marginBottom:"5px", color:c.liveGame?"var(--accent)":"var(--muted)" } }, `🟢 Em quadra: ${c.liveGame ? safeText(c.liveGame.a)+" × "+safeText(c.liveGame.b) : "-"}`);
    const nextLine = el("div", { "style": { fontSize:"12px", color:c.nextGame?"var(--blue)":"var(--muted)" } }, `🔵 Próximo: ${c.nextGame ? safeText(c.nextGame.a)+" × "+safeText(c.nextGame.b) : "-"}`);
    box.appendChild(liveLine);
    box.appendChild(nextLine);
    grid.appendChild(box);
  });
  statusCard.appendChild(grid);
  wrap.appendChild(statusCard);

  const pickerCard = div("card");
  pickerCard.appendChild(renderCardHead("Atribuir Jogos às Quadras"));
  pickerCard.appendChild(el("p", { "style": { fontSize:"11px", color:"var(--muted)", marginBottom:"10px" } }, "Use os botões com o número real da quadra para marcar o jogo como Em Quadra ou Próximo."));

  const byCtx = {};
  games.forEach(g => { if(!byCtx[g.ctx]) byCtx[g.ctx]=[]; byCtx[g.ctx].push(g); });

  Object.entries(byCtx).forEach(([ctx, ctxGames]) => {
    pickerCard.appendChild(el("div", { "class":"section-lbl" }, ctx));
    ctxGames.forEach(g => {
      const asg = courtAssignmentsFor(t, g.key);
      const isLive = asg.live.length > 0;
      const isNext = asg.next.length > 0;
      const isDone = hasScorePair(g.sA, g.sB);
      const row = el("div", { "style": { display:"grid", gridTemplateColumns:"38px 1fr auto", gap:"8px", alignItems:"center", padding:"8px", borderRadius:"7px", marginBottom:"6px", background:isLive?"rgba(0,229,160,.08)":isNext?"rgba(61,142,255,.06)":"transparent", border:`1px solid ${isLive?"rgba(0,229,160,.4)":isNext?"rgba(61,142,255,.3)":"var(--border)"}` } });
      row.appendChild(el("span", { "style": { fontFamily:"var(--mono)", fontSize:"9px", color:"var(--muted)" } }, `#${safeText(g.id)}`));
      const title = el("div", { "style": { fontSize:"12px", fontWeight:"600" } }, `${safeText(g.a)} × ${safeText(g.b)}`);
      if(isSetSportTournament(t)) title.appendChild(el("span", { "style": { fontFamily:"var(--mono)", fontSize:"10px", color:"var(--muted)", marginLeft:"8px" } }, setScoreSummary(g, t)));
      else if(isDone) title.appendChild(el("span", { "style": { fontFamily:"var(--mono)", fontSize:"10px", color:"var(--muted)", marginLeft:"8px" } }, `${safeScore(g.sA)}–${safeScore(g.sB)}`));
      if(asg.live.length) title.appendChild(el("span", { "class":"g-badge live-badge", "style": { marginLeft:"8px" } }, `QUADRA ${asg.live.join(",")}`));
      if(asg.next.length) title.appendChild(el("span", { "class":"g-badge next-badge", "style": { marginLeft:"8px" } }, `PRÓX ${asg.next.join(",")}`));
      row.appendChild(title);
      const acts = el("div", { "style": { display:"flex", flexDirection:"column", gap:"4px" } });
      const liveBtns = div("court-pick");
      const nextBtns = div("court-pick");
      courts.forEach(c => {
        const label = courtLabel(c);
        const liveOn = normalizeGameKey(c.liveId) === normalizeGameKey(g.key);
        const nextOn = normalizeGameKey(c.nextId) === normalizeGameKey(g.key);
        liveBtns.appendChild(el("button", { "class":"cp-btn cp-live"+(liveOn?" on":""), onClick:()=>persistTournament(setCourtGame(t, c.id, "live", g.key)) }, `🟢 Q${label}`));
        nextBtns.appendChild(el("button", { "class":"cp-btn cp-next"+(nextOn?" on":""), onClick:()=>persistTournament(setCourtGame(t, c.id, "next", g.key)) }, `🔵 Q${label}`));
      });
      acts.appendChild(liveBtns);
      acts.appendChild(nextBtns);
      row.appendChild(acts);
      pickerCard.appendChild(row);
    });
  });
  wrap.appendChild(pickerCard);
  return wrap;
}

//  AWARDS ADMIN
// ══════════════════════════════════════════════════════════
function renderAwardsAdmin(t) {
  const wrap = div("");
  const awards = t.awards || [];
  const allTeams = uniqueTeams(t);

  const card = div("card");
  card.appendChild(renderCardHead("Gerenciar Prêmios"));

  // Add new award
  const addBox = el("div",{"style":{padding:"10px",border:"1px solid var(--border)",borderRadius:"7px",background:"var(--bg)",marginBottom:"12px"}});
  const addRow = el("div",{"style":{display:"flex",gap:"8px",marginBottom:"8px",flexWrap:"wrap"}});
  const nameInp = el("input",{"class":"inp","placeholder":"Ex: Melhor Jogador, MVP, Fair Play...","style":{flex:"1",minWidth:"180px"}});
  const modeSel = el("select",{"class":"inp","style":{width:"220px",maxWidth:"100%"}});
  modeSel.appendChild(el("option",{"value":"teams"},"Candidatos = equipes"));
  modeSel.appendChild(el("option",{"value":"manual"},"Candidatos manuais"));
  addRow.appendChild(nameInp);
  addRow.appendChild(modeSel);
  addBox.appendChild(addRow);

  const manualCreateWrap = el("div",{"style":{display:"none",marginBottom:"8px"}});
  manualCreateWrap.appendChild(el("label",{"class":"lbl"},"Nomes dos candidatos manuais"));
  const manualCreateInp = el("textarea",{"class":"textarea","style":{minHeight:"70px"},"placeholder":"Um nome por linha ou separados por vírgula\nEx:\nJoão Silva\nMaria Santos\nPedro Lima"});
  manualCreateWrap.appendChild(manualCreateInp);
  addBox.appendChild(manualCreateWrap);
  modeSel.addEventListener("change",()=>{
    manualCreateWrap.style.display = modeSel.value === "manual" ? "block" : "none";
  });

  const addErr = div("err");
  addBox.appendChild(addErr);
  addBox.appendChild(btn("btn-primary btn-sm","+ Criar Prêmio",()=>{
    const name = nameInp.value.trim();
    if(!name){ addErr.textContent="Informe o nome do prêmio."; return; }
    const mode = modeSel.value;
    const manualCandidates = parseCandidatesText(manualCreateInp.value);
    const initialCandidates = mode === "manual" ? manualCandidates : [...allTeams];
    if(mode === "manual" && initialCandidates.length === 0){ addErr.textContent="Digite pelo menos um candidato manual."; return; }
    const newAward = { id: Date.now().toString(), name, candidateMode: mode, candidates: initialCandidates, enabled: true };
    persistTournament({...t, awards:[...awards, newAward], votes:{...(t.votes||{}),[newAward.id]:{}}});
    nameInp.value="";
    manualCreateInp.value="";
    addErr.textContent="";
  }));
  card.appendChild(addBox);

  if(awards.length===0){
    card.appendChild(el("p",{"style":{fontSize:"12px",color:"var(--muted)",padding:"10px 0"}},"Nenhum prêmio criado ainda."));
  }

  awards.forEach(award=>{
    const candidates = award.candidates || [];
    const mode = award.candidateMode || "teams"; // compatibilidade com prêmios antigos
    const ac = div("award-card");
    const hdr = el("div",{"style":{display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px",marginBottom:"8px",flexWrap:"wrap"}});
    hdr.appendChild(el("div",{"class":"award-title"},`🏅 ${award.name}`));
    const acts = el("div",{"style":{display:"flex",gap:"6px",flexWrap:"wrap"}});

    const votingEnabled = t.votingOpen;
    acts.appendChild(btn(votingEnabled?"btn-danger btn-sm":"btn-blue btn-sm",votingEnabled?"🔒 Fechar Votação":"🗳 Abrir Votação",()=>{
      persistTournament({...t,votingOpen:!votingEnabled});
    }));
    acts.appendChild(btn("btn-danger btn-sm","🗑",()=>{
      const newAwards = awards.filter(a=>a.id!==award.id);
      const newVotes = {...(t.votes||{})}; delete newVotes[award.id];
      persistTournament({...t,awards:newAwards,votes:newVotes});
    }));
    hdr.appendChild(acts);
    ac.appendChild(hdr);

    const editBox = el("div",{"style":{padding:"10px",border:"1px solid var(--border)",borderRadius:"7px",background:"var(--bg)",marginBottom:"10px"}});
    editBox.appendChild(el("div",{"style":{fontSize:"10px",fontWeight:"700",letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--muted)",marginBottom:"8px"}},"Candidatos deste prêmio"));

    const modeRow = el("div",{"style":{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap",marginBottom:"10px"}});
    modeRow.appendChild(el("span",{"style":{fontSize:"11px",color:"var(--muted)"}},"Origem dos candidatos:"));
    const modeEditSel = el("select",{"class":"inp","style":{width:"230px",maxWidth:"100%"}});
    modeEditSel.appendChild(el("option",{"value":"teams"},"Selecionar equipes"));
    modeEditSel.appendChild(el("option",{"value":"manual"},"Digitar nomes manualmente"));
    modeEditSel.value = mode;
    modeEditSel.addEventListener("change",()=>{
      const newMode = modeEditSel.value;
      let nextCandidates = candidates;
      if(newMode === "teams") nextCandidates = candidates.filter(c=>allTeams.includes(c));
      const updatedAward = {...award, candidateMode:newMode, candidates:nextCandidates};
      const updatedAwards = awards.map(a=>a.id===award.id?updatedAward:a);
      persistTournament({...t,awards:updatedAwards});
    });
    modeRow.appendChild(modeEditSel);
    editBox.appendChild(modeRow);

    if(mode === "manual"){
      editBox.appendChild(el("label",{"class":"lbl"},"Lista manual de candidatos"));
      const manualInp = el("textarea",{"class":"textarea","style":{minHeight:"80px"},"placeholder":"Um nome por linha ou separados por vírgula"});
      manualInp.value = candidates.join("\n");
      editBox.appendChild(manualInp);
      editBox.appendChild(el("div",{"style":{display:"flex",gap:"8px",alignItems:"center",marginTop:"8px",flexWrap:"wrap"}},
        btn("btn-primary btn-sm","💾 Salvar nomes",()=>{
          const nextCandidates = parseCandidatesText(manualInp.value);
          const updatedAward = {...award, candidateMode:"manual", candidates:nextCandidates};
          const updatedAwards = awards.map(a=>a.id===award.id?updatedAward:a);
          persistTournament({...t,awards:updatedAwards});
        }),
        el("span",{"style":{fontSize:"10px",color:"var(--muted)"}},"Use esta opção para Melhor Jogador, MVP ou outras premiações individuais.")
      ));
    } else {
      if(!allTeams.length){
        editBox.appendChild(el("p",{"style":{fontSize:"11px",color:"var(--muted)"}},"Nenhuma equipe disponível no torneio."));
      } else {
        const grid = el("div",{"style":{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:"6px"}});
        allTeams.forEach(team=>{
          const checked = candidates.includes(team);
          const opt = el("label",{"style":{display:"flex",alignItems:"center",gap:"8px",padding:"7px 9px",border:"1px solid var(--border)",borderRadius:"6px",background:checked?"var(--accentfade)":"var(--s1)",cursor:"pointer",fontSize:"12px"}});
          const cb = el("input",{"type":"checkbox"});
          cb.checked = checked;
          cb.addEventListener("change",()=>{
            const current = new Set(candidates);
            if(cb.checked) current.add(team); else current.delete(team);
            const updatedAward = {...award, candidateMode:"teams", candidates:[...current]};
            const updatedAwards = awards.map(a=>a.id===award.id?updatedAward:a);
            persistTournament({...t,awards:updatedAwards});
          });
          opt.appendChild(cb);
          opt.appendChild(el("span",{},team));
          grid.appendChild(opt);
        });
        editBox.appendChild(grid);
      }
    }
    ac.appendChild(editBox);

    // Vote results
    const awardVotes = t.votes?.[award.id] || {};
    const totalVotes = Object.values(awardVotes).length;
    const tally = {};
    Object.values(awardVotes).forEach(v=>{ tally[v]=(tally[v]||0)+1; });

    ac.appendChild(el("div",{"style":{fontSize:"10px",color:"var(--muted)",marginBottom:"6px"}},`${totalVotes} voto${totalVotes!==1?"s":""} registrado${totalVotes!==1?"s":""}`));

    if(candidates.length===0){
      ac.appendChild(el("p",{"style":{fontSize:"11px",color:"var(--red)",marginBottom:"8px"}},"Selecione ou digite pelo menos um candidato para este prêmio."));
    }

    candidates.forEach(team=>{
      const count = tally[team]||0;
      const pct = totalVotes>0?Math.round((count/totalVotes)*100):0;
      const row = el("div",{"class":"vote-option result-mode","style":{"cursor":"default"}});
      row.appendChild(el("span",{"class":"vote-name"},team));
      const bw = div("vote-bar-wrap");
      bw.appendChild(el("div",{"class":"vote-bar","style":{width:`${pct}%`}}));
      row.appendChild(bw);
      row.appendChild(el("span",{"class":"vote-pct"},`${pct}%`));
      row.appendChild(el("span",{"class":"vote-count"},`(${count})`));
      ac.appendChild(row);
    });
    card.appendChild(ac);
  });

  wrap.appendChild(card);
  return wrap;
}

function parseCandidatesText(txt) {
  return [...new Set((txt || "")
    .split(/[\n,;]+/)
    .map(s=>s.trim())
    .filter(Boolean))];
}

//  AWARDS PUBLIC
// ══════════════════════════════════════════════════════════
function renderAwardsPublic(t) {
  const wrap = div("");
  const awards = t.awards || [];
  if(!awards.length) return wrap;

  const card = div("card");
  card.appendChild(renderCardHead("🏅 Prêmios & Votação"));

  awards.forEach(award=>{
    const ac = div("award-card");
    ac.appendChild(el("div",{"class":"award-title"},`🏅 ${award.name}`));

    const awardVotes = t.votes?.[award.id]||{};
    const totalVotes = Object.values(awardVotes).length;
    const tally = {};
    Object.values(awardVotes).forEach(v=>{ tally[v]=(tally[v]||0)+1; });

    const myVote = STATE.voteId[award.id];
    const canVote = t.votingOpen && !myVote;

    if(!t.votingOpen && !myVote){
      ac.appendChild(el("p",{"style":{fontSize:"11px",color:"var(--muted)",marginBottom:"8px"}},"Votação não aberta ainda."));
    }

    award.candidates.forEach(team=>{
      const count = tally[team]||0;
      const pct = totalVotes>0?Math.round((count/totalVotes)*100):0;
      const isMine = myVote===team;
      const row = el("div",{"class":`vote-option${isMine?" voted-mine":""}${!canVote?" result-mode":""}`,
        onClick: canVote?()=>handleVote(t, award.id, team):null
      });
      row.appendChild(el("span",{"class":"vote-name"},team));
      if(myVote||!t.votingOpen){
        const bw = div("vote-bar-wrap");
        bw.appendChild(el("div",{"class":"vote-bar","style":{width:`${pct}%`}}));
        row.appendChild(bw);
        row.appendChild(el("span",{"class":"vote-pct"},`${pct}%`));
      }
      if(isMine) row.appendChild(span("voted-badge","✓ SEU VOTO"));
      ac.appendChild(row);
    });

    if(canVote) ac.appendChild(el("p",{"style":{fontSize:"10px",color:"var(--muted)",marginTop:"6px"}},"Toque em um nome para votar. Apenas 1 voto por dispositivo."));
    card.appendChild(ac);
  });

  wrap.appendChild(card);
  return wrap;
}

async function handleVote(t, awardId, team) {
  const sessionId = getSessionId();
  const newVotes = {
    ...(t.votes||{}),
    [awardId]: { ...(t.votes?.[awardId]||{}), [sessionId]: team }
  };
  STATE.voteId = { ...STATE.voteId, [awardId]: team };
  await persistTournament({ ...t, votes: newVotes });
}

function getSessionId() {
  let sid = localStorage.getItem("torneio-session");
  if (!sid) { sid = Math.random().toString(36).slice(2); localStorage.setItem("torneio-session", sid); }
  return sid;
}

// ══════════════════════════════════════════════════════════
//  TOURNAMENT ROUTER
// ══════════════════════════════════════════════════════════
function renderTournament(t, readOnly) {
  if(t.fmt==="sg") return renderSingleGroup(t, readOnly);
  if(t.fmt==="mg") return renderMultiGroup(t, readOnly);
  if(t.fmt==="se") return renderSingleElim(t, readOnly);
  if(t.fmt==="sw") return renderSwiss(t, readOnly);
  return div("");
}

// ──────────────────────────────────────────────────────────
//  SINGLE GROUP
// ──────────────────────────────────────────────────────────
function renderSingleGroup(t, readOnly) {
  const wrap = div("");
  const ranking = calcStats(t.teams, t.games, t.rules);
  const allDone = isSetSportTournament(t) ? t.games.every(g=>g.status === "finished") : t.games.every(g=>g.sA!==null&&g.sB!==null);
  const top2 = ranking.slice(0,2).map(r=>r.team);
  const mid = ranking.slice(2,4).map(r=>r.team);
  const finals = t.finals||{finalGame:{sA:null,sB:null},thirdGame:{sA:null,sB:null}};

  wrap.appendChild(renderClassTable(ranking, true, t.rules));

  const gc = div("card");
  gc.appendChild(renderCardHead("Jogos — Fase de Grupos"));
  gc.appendChild(renderGameList(t.games, readOnly, t, (id,field,val)=>{
    const games = t.games.map(g=>g.id===id?{...g,...scorePatch(field,val)}:g);
    persistTournament({...t,games});
  }));
  wrap.appendChild(gc);

  if(allDone||!readOnly){
    const fc = div("card");
    fc.appendChild(renderCardHead("Fase Final"));
    if(mid.length>=2){
      fc.appendChild(renderElimSlot("3º Lugar",mid[0],mid[1],finals.thirdGame?.sA,finals.thirdGame?.sB,"elim-third",readOnly,t,"final-3",(f,v)=>{
        persistTournament({...t,finals:{...finals,thirdGame:{...finals.thirdGame,...scorePatch(f,v)}}});
      }));
    }
    if(top2.length===2){
      fc.appendChild(renderElimSlot("Final 🏆",top2[0],top2[1],finals.finalGame?.sA,finals.finalGame?.sB,"elim-final",readOnly,t,"final-f",(f,v)=>{
        persistTournament({...t,finals:{...finals,finalGame:{...finals.finalGame,...scorePatch(f,v)}}});
      }));
    }
    const fw = winner(finals.finalGame?.sA,finals.finalGame?.sB,top2[0],top2[1]);
    const tw = winner(finals.thirdGame?.sA,finals.thirdGame?.sB,mid[0],mid[1]);
    if(fw||tw) fc.appendChild(renderPodium(fw,top2.find(x=>x!==fw),tw));
    wrap.appendChild(fc);
  }
  return wrap;
}

// ──────────────────────────────────────────────────────────
//  MULTI GROUP
// ──────────────────────────────────────────────────────────
function renderMultiGroup(t, readOnly) {
  const wrap = div("");
  const gkeys = Object.keys(t.groups);
  const rankings = {};
  gkeys.forEach(k=>{ rankings[k]=calcStats(t.groups[k].teams,t.groups[k].games,t.rules); });
  const allDone = isSetSportTournament(t) ? gkeys.every(k=>t.groups[k].games.every(g=>g.status === "finished")) : gkeys.every(k=>t.groups[k].games.every(g=>g.sA!==null&&g.sB!==null));
  const colors = ["var(--accent)","var(--blue)","#f472b6","#fb923c","#a78bfa","#f87171"];

  const twoCol = div("two-col");
  gkeys.forEach((k,gi)=>{
    const gc = div("card");
    const ch = renderCardHead(k);
    ch.querySelector(".ch-dot").style.background=colors[gi%colors.length];
    ch.querySelector(".ch-label").style.color=colors[gi%colors.length];
    gc.appendChild(ch);
    gc.appendChild(renderClassTable(rankings[k],false, t.rules));
    gc.appendChild(el("hr",{"class":"divider"}));
    gc.appendChild(renderGameList(t.groups[k].games,readOnly,t,(id,field,val)=>{
      const grp={...t.groups[k],games:t.groups[k].games.map(g=>g.id===id?{...g,...scorePatch(field,val)}:g)};
      persistTournamentWithDerived({...t,groups:{...t.groups,[k]:grp}}, "Correção de placar na fase de grupos");
    },k));
    twoCol.appendChild(gc);
  });
  wrap.appendChild(twoCol);

  if(allDone||!readOnly){
    const ec = div("card");
    ec.appendChild(renderCardHead("Fase Eliminatória"));
    const q=t.qpg||2;
    const qualifiedRows=gkeys.flatMap(k=>rankings[k].slice(0,q).map(r=>({...r,group:k})));
    const qualified=[...qualifiedRows].sort((a,b)=>{
      const setSport = isSetSport(t.rules);
      return setSport
        ? (b.w-a.w || b.setDiff-a.setDiff || b.diff-a.diff || b.gf-a.gf || String(a.team).localeCompare(String(b.team)))
        : (b.pts-a.pts || b.w-a.w || b.diff-a.diff || b.gf-a.gf || String(a.team).localeCompare(String(b.team)));
    }).map((r,i)=>({team:r.team, group:r.group, seed:i+1}));
    if(!t.brk&&!readOnly&&allDone){
      const n = div("notice notice-info");
      const bracketSize = pow2(qualified.length || 2);
      const byes = Math.max(0, bracketSize - qualified.length);
      n.appendChild(document.createTextNode(`Grupos concluídos! ${qualified.length} classificados · chave de ${bracketSize}${byes?` · ${byes} bye(s) para os melhores seeds`:""}. `));
      n.appendChild(btn("btn-primary btn-sm","Gerar Chaveamento",()=>persistTournament({...t,brk:buildBracket(qualified,t.rules?.bracketRules||{})})));
      ec.appendChild(n);
    }
    if(t.brk) { ec.appendChild(renderBracket(t.brk,readOnly,t,(rounds)=>persistTournament({...t,brk:rounds}))); const thirdBlock = renderThirdPlaceBlock(t, readOnly); if (thirdBlock) ec.appendChild(thirdBlock); }
    wrap.appendChild(ec);
  }
  return wrap;
}


function renderThirdPlaceBlock(t, readOnly) {
  if (!t?.brk || t.rules?.includeThirdPlace === false) return null;

  const semiRound = t.brk?.[t.brk.length - 2];
  if (!semiRound || !Array.isArray(semiRound.games) || semiRound.games.length < 2) return null;

  const semiLabels = semiRound.games.slice(0, 2).map((g, idx) => {
    const w = winner(g.sA, g.sB, g.a, g.b);
    if (!w) return `Perdedor ${semiRound.name || "Semifinal"} ${idx + 1}`;
    return w === g.a ? g.b : g.a;
  });

  const semiResolved = semiRound.games.slice(0, 2).every(g => !!winner(g.sA, g.sB, g.a, g.b));

  const finalRound = t.brk?.[t.brk.length - 1];
  const finalG = finalRound?.games?.[0];
  const finalWinner = winner(finalG?.sA, finalG?.sB, finalG?.a, finalG?.b);
  const finalLoser = finalWinner ? (finalWinner === finalG?.a ? finalG?.b : finalG?.a) : null;

  const tc = div("card");
  tc.appendChild(renderCardHead("3º Lugar"));

  const tp = t.tp || { sA: null, sB: null };
  tc.appendChild(renderElimSlot(
    "3º Lugar",
    semiLabels[0],
    semiLabels[1],
    tp.sA,
    tp.sB,
    "elim-third",
    readOnly || !semiResolved,
    t,
    "tp",
    (f, v) => {
      persistTournament({
        ...t,
        tp: { ...tp, ...scorePatch(f, v) }
      });
    }
  ));

  if (!semiResolved) {
    tc.appendChild(el("div", {style:{fontSize:"10px",color:"var(--muted)",marginTop:"6px"}},
      "A disputa de 3º lugar está prevista. As equipes serão preenchidas após as semifinais."
    ));
  }

  const thirdWinner = semiResolved ? winner(tp.sA, tp.sB, semiLabels[0], semiLabels[1]) : null;
  if (finalWinner || thirdWinner) {
    tc.appendChild(renderPodium(finalWinner, finalLoser, thirdWinner));
  }

  return tc;
}

// ──────────────────────────────────────────────────────────
//  SWISS
// ──────────────────────────────────────────────────────────
function renderSwiss(t, readOnly) {
  const wrap = div("");
  const standing = calcStats(t.teams, t.allG||[], t.rules);
  const allPlayed = t.curG?.every(g=>g.sA!==null&&g.sB!==null);
  const done = t.round > t.swR;

  const sb = el("div",{"style":{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}});
  sb.appendChild(el("span",{"class":"swiss-badge"},`Rodada ${t.round} / ${t.swR}`));
  if(done) sb.appendChild(el("span",{"style":{fontSize:"12px",color:"var(--gold)"}},"🏆 Torneio encerrado"));
  wrap.appendChild(sb);

  wrap.appendChild(renderClassTable(standing, true, t.rules));

  const gc = div("card");
  gc.appendChild(renderCardHead(`Rodada ${t.round}`));
  gc.appendChild(renderGameList(t.curG||[],readOnly,t,(id,field,val)=>{
    const curG = t.curG.map(g=>g.id===id?{...g,...scorePatch(field,val)}:g);
    persistTournament({...t,curG});
  }));
  if(!readOnly&&allPlayed&&t.round<t.swR){
    const nb = btn("btn-primary btn-sm","▶ Próxima Rodada",()=>{
      const all=[...(t.allG||[]),...t.curG];
      persistTournament({...t,allG:all,curG:swissPair(t.teams,all,calcStats(t.teams,all,t.rules)),round:t.round+1});
    });
    gc.appendChild(el("div",{"style":{marginTop:"10px"}},nb));
  }
  wrap.appendChild(gc);

  if(done) wrap.appendChild(el("div",{"class":"card"},renderPodium(standing[0]?.team,standing[1]?.team,standing[2]?.team)));
  return wrap;
}

//  REUSABLE COMPONENTS

function renderCardHead(label) {
  const h = div("card-head");
  h.appendChild(div("ch-dot"));
  h.appendChild(el("span",{"class":"ch-label"},label));
  return h;
}

function renderClassTable(ranking, showPts, rules) {
  const rRules = rules || {};
  const isSetSport = rRules.matchMode === "sets" || rRules.sport === "volei" || rRules.sport === "futevolei";
  const wrap = div("cls-wrap");
  const table = el("table",{"class":"cls-table"});
  const thead = el("thead");
  const hr = el("tr");
  const headers = isSetSport
    ? ["#","Equipe / Dupla","J","V","D","PP","PC","Saldo"]
    : ["#","Equipe / Dupla","J","V","E","D","GP","GC","Saldo",...(showPts?["Pts"]:[])];
  headers.forEach((h,i)=>{ const th=el("th",{},h); if(i>1) th.className="c"; hr.appendChild(th); });
  thead.appendChild(hr); table.appendChild(thead);
  const tbody = el("tbody");
  const icons = ["🥇","🥈","🥉"];
  const rCls = ["r1","r2","r3"];
  ranking.forEach((r,i)=>{
    const tr = el("tr",{"class":i<2&&showPts?"qualify":""});
    const rankEl=el("span",{"class":`rank ${rCls[i]||"rn"}`},icons[i]||(i+1).toString());
    tr.appendChild(el("td",{},rankEl));
    tr.appendChild(el("td",{"style":{fontWeight:"600"}},safeText(r.team)));
    const rowValues = isSetSport
      ? [r.played,r.w,r.l,r.gf,r.ga]
      : [r.played,r.w,r.d,r.l,r.gf,r.ga];
    rowValues.forEach(v=>{
      tr.appendChild(el("td",{"class":"c","style":{fontFamily:"var(--mono)",fontSize:"11px",color:"var(--muted)"}},safeText(v)));
    });
    const diffEl=el("td",{"class":"c","style":{fontFamily:"var(--mono)",fontSize:"11px",color:r.diff>0?"var(--accent)":r.diff<0?"var(--red)":"var(--muted)"}},isValidNumber(r.diff)?`${r.diff>0?"+":""}${r.diff}`:"-");
    tr.appendChild(diffEl);
    if(!isSetSport && showPts) tr.appendChild(el("td",{"class":"c"},el("span",{"class":"pts-badge"},safeText(r.pts))));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

function renderSetPartials(g, t) {
  if (!isSetSportTournament(t)) return null;
  const wrap = el("div", {class:"set-partials", style:{margin:"4px 0 8px 30px", padding:"7px 9px", border:"1px solid var(--border)", borderRadius:"7px", background:"rgba(255,255,255,.02)", fontSize:"11px", color:"var(--muted)"}});
  const state = getSetState(g, t);
  const lines = [];
  state.sets.forEach((st, i) => {
    lines.push(`${safeScore(st.a)} × ${safeScore(st.b)} - ${i+1}º set`);
  });
  const currentSet = Number(g?.currentSet || state.sets.length + 1);
  const hasCurrentPartial = g?.status !== "finished" && hasScorePair(g?.sA, g?.sB);
  if (hasCurrentPartial && currentSet > state.sets.length) {
    lines.push(`${safeScore(g.sA)} × ${safeScore(g.sB)} - ${currentSet}º set`);
  }
  if (!lines.length) lines.push("Sets ainda não iniciados");
  lines.forEach(line => wrap.appendChild(el("div", {}, line)));
  wrap.appendChild(el("div", {style:{marginTop:"4px", color:"var(--text)", fontWeight:"700"}}, `Parcial: ${safeScore(state.aSets)} × ${safeScore(state.bSets)}`));
  return wrap;
}

function renderGameList(games, readOnly, t, onScore, groupKey) {
  const list = div("game-list");
  games.forEach(g=>{
    const key = groupKey?`g-${groupKey}-${g.id}`:`sg-${g.id}`;
    list.appendChild(renderGameRow(g, readOnly, t, key, onScore));
  });
  return list;
}

function renderGameRow(g, readOnly, t, key, onScore) {
  const done = hasScorePair(g.sA, g.sB);
  const aW = done&&+g.sA>+g.sB, bW = done&&+g.sB>+g.sA;
  const assignment = firstCourtAssignment(t, key);
  const isLive = assignment?.type === "live", isNext = assignment?.type === "next";
  const cls = `game-row ${isLive?"is-live":isNext?"is-next":done?"done":"pending"}`;
  const row = el("div",{"class":cls});

  const numEl = el("span",{"class":"g-num"});
  if(isLive) numEl.innerHTML=`<span style="color:var(--accent)">●</span>`;
  else if(isNext) numEl.innerHTML=`<span style="color:var(--blue)">●</span>`;
  else numEl.textContent=`#${safeText(g.id)}`;
  row.appendChild(numEl);

  row.appendChild(el("span",{"class":"g-team"+(aW?" winner":"")},safeText(g.a)));

  if(isSetSportTournament(t)){
    const st = getSetState(g, t);
    row.appendChild(el("span",{"class":"g-score"+(st.aSets>st.bSets?" winner":"")},safeScore(st.aSets)));
    row.appendChild(el("span",{"class":"g-vs"},"sets"));
    row.appendChild(el("span",{"class":"g-score"+(st.bSets>st.aSets?" winner":"")},safeScore(st.bSets)));
  } else if(readOnly){
    row.appendChild(el("span",{"class":"g-score"+(aW?" winner":"")},done?safeScore(g.sA):"-"));
    row.appendChild(el("span",{"class":"g-vs"},"×"));
    row.appendChild(el("span",{"class":"g-score"+(bW?" winner":"")},done?safeScore(g.sB):"-"));
  } else {
    const inA = el("input",{"class":"g-score-inp","type":"number","min":"0","value":safeInputValue(g.sA)});
    const inB = el("input",{"class":"g-score-inp","type":"number","min":"0","value":safeInputValue(g.sB)});
    const commit=()=>{ if(inA.value!==""&&inB.value!==""){ onScore(g.id,"__score",{sA:inA.value,sB:inB.value}); } };
    inA.addEventListener("blur",commit); inB.addEventListener("blur",commit);
    inA.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();inB.focus();}});
    inB.addEventListener("keydown",e=>{if(e.key==="Enter")commit();});
    row.appendChild(inA);
    row.appendChild(el("span",{"class":"g-vs"},"×"));
    row.appendChild(inB);
  }

  row.appendChild(el("span",{"class":"g-team"+(bW?" winner":"")},safeText(g.b)));

  if(isLive) row.appendChild(el("span",{"class":"g-badge live-badge"},`Q${assignment.courts.join(",")}`));
  else if(isNext) row.appendChild(el("span",{"class":"g-badge next-badge"},`PRÓX Q${assignment.courts.join(",")}`));
  else if(!readOnly&&done) row.appendChild(el("span",{"class":"g-ok"},"✓"));

  const partials = renderSetPartials(g, t);
  const editor = (!readOnly && isSetSportTournament(t)) ? renderAdminSetEditor(g, t, (patch)=>onScore(g.id, "__patch", patch)) : null;
  if (partials || editor) {
    const box = div("");
    box.appendChild(row);
    if (partials) box.appendChild(partials);
    if (editor) box.appendChild(editor);
    return box;
  }
  return row;
}


function renderAdminSetEditor(g, t, onPatch) {
  if (!isSetSportTournament(t)) return null;
  const card = el("div", {class:"set-partials", style:{margin:"6px 0 10px 30px", padding:"9px", border:"1px solid rgba(0,229,160,.25)", borderRadius:"8px", background:"rgba(0,229,160,.04)"}});
  card.appendChild(el("div", {style:{fontSize:"10px", letterSpacing:"1.5px", textTransform:"uppercase", color:"var(--accent)", fontWeight:"700", marginBottom:"7px"}}, "Editar sets — Admin"));
  const maxSets = maxSetsForTournament(t);
  const grid = el("div", {style:{display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))", gap:"8px"}});
  const inputs = [];
  for (let i = 0; i < maxSets; i++) {
    const existing = Array.isArray(g.sets) ? g.sets[i] : null;
    const box = el("div", {style:{display:"flex", alignItems:"center", gap:"5px", background:"var(--s1)", border:"1px solid var(--border)", borderRadius:"7px", padding:"7px"}});
    box.appendChild(el("span", {style:{fontSize:"10px", color:"var(--muted)", minWidth:"42px"}}, `${i+1}º set`));
    const a = el("input", {class:"g-score-inp", type:"number", min:"0", value:safeInputValue(existing?.a)});
    const b = el("input", {class:"g-score-inp", type:"number", min:"0", value:safeInputValue(existing?.b)});
    inputs.push({a,b});
    box.appendChild(a); box.appendChild(el("span", {class:"g-vs"}, "×")); box.appendChild(b);
    grid.appendChild(box);
  }
  card.appendChild(grid);
  const err = div("err");
  card.appendChild(err);
  card.appendChild(el("div", {style:{marginTop:"8px", display:"flex", gap:"8px", flexWrap:"wrap"}},
    btn("btn-primary btn-sm", "Salvar sets", () => {
      const patch = deriveSetPatchFromInputs(g, t, inputs.map(x => ({a:x.a.value, b:x.b.value})));
      onPatch(patch);
    }),
    btn("btn-ghost btn-sm", "Limpar sets", () => onPatch({sets:[], currentSet:1, sA:null, sB:null, status:"pending", finishedAt:null}))
  ));
  return card;
}

function renderElimSlot(label, a, b, sA, sB, cls, readOnly, t, key, onScore) {
  const done=hasScorePair(sA,sB);
  const aW=done&&+sA>+sB, bW=done&&+sB>+sA;
  const assignment = firstCourtAssignment(t, key);
  const isLive=assignment?.type === "live", isNext=assignment?.type === "next";
  const slot = el("div",{"class":`elim-slot ${cls}${isLive?" is-live":isNext?" is-next":""}`});
  slot.appendChild(el("span",{"class":"elim-lbl"},label));
  slot.appendChild(el("span",{"class":"g-team"+(aW?" winner":"")},safeText(a)));

  if(readOnly){
    slot.appendChild(el("span",{"class":"g-score"+(aW?" winner":"")},done?safeScore(sA):"-"));
    slot.appendChild(el("span",{"class":"g-vs"},"×"));
    slot.appendChild(el("span",{"class":"g-score"+(bW?" winner":"")},done?safeScore(sB):"-"));
  } else {
    const inA=el("input",{"class":"g-score-inp","type":"number","min":"0","value":safeInputValue(sA)});
    const inB=el("input",{"class":"g-score-inp","type":"number","min":"0","value":safeInputValue(sB)});
    const commit=()=>{if(inA.value!==""&&inB.value!==""){onScore("__score",{sA:inA.value,sB:inB.value});}};
    inA.addEventListener("blur",commit);inB.addEventListener("blur",commit);
    inA.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key==="Tab"){e.preventDefault();inB.focus();}});
    inB.addEventListener("keydown",e=>{if(e.key==="Enter")commit();});
    slot.appendChild(inA);
    slot.appendChild(el("span",{"class":"g-vs"},"×"));
    slot.appendChild(inB);
  }
  slot.appendChild(el("span",{"class":"g-team"+(bW?" winner":"")},safeText(b)));
  if(isLive) slot.appendChild(el("span",{"class":"g-badge live-badge"},"QUADRA"));
  else if(isNext) slot.appendChild(el("span",{"class":"g-badge next-badge"},"PRÓX"));
  return slot;
}

function renderBracket(rounds, readOnly, t, onUpdate) {
  const wrap = div("");
  rounds.forEach((rnd,ri)=>{
    const titleRow = el("div", {style:{display:"flex", alignItems:"center", gap:"8px", margin:"14px 0 8px", flexWrap:"wrap"}});
    if (!readOnly) {
      const nameInp = el("input", {class:"inp", value:rnd.name || rndName(Math.pow(2, Math.max(0, rounds.length-ri-1))), style:{maxWidth:"240px"}, onChange:e=>{
        const r = JSON.parse(JSON.stringify(rounds));
        r[ri].name = e.target.value.trim() || r[ri].name;
        onUpdate(r);
      }});
      titleRow.appendChild(nameInp);
      titleRow.appendChild(el("span", {style:{fontSize:"10px", color:"var(--muted)"}}, "Nome da fase"));
    } else {
      titleRow.appendChild(el("div",{"class":"brk-round-title", style:{margin:"0"}},rnd.name));
    }
    wrap.appendChild(titleRow);

    rnd.games.forEach((g,gi)=>{
      const key=`${t.fmt==="se"?"se":"br"}-${rnd.rn}-${gi}`;
      const isBye = !!g.byeWinner || (g.a && !g.b) || (!g.a && g.b);
      const slot = renderElimSlot(isBye ? "BYE" : `J${gi+1}`,g.a,g.b,g.sA,g.sB,rnd.name==="Final 🏆"?"elim-final":rnd.name==="Semifinal"?"elim-semi":"",readOnly || isBye,t,key,(field,val)=>{
        const r=JSON.parse(JSON.stringify(rounds));
        Object.assign(r[ri].games[gi], scorePatch(field,val));
        onUpdate(propagateBracket(r));
      });
      if (isBye) {
        const byeTeam = g.byeWinner || g.a || g.b;
        slot.appendChild(el("div",{"style":{fontSize:"10px",color:"var(--blue)",marginTop:"5px"}},`BYE automático: ${safeText(byeTeam)} avança sem placar`));
      }
      if (g.aGroup || g.bGroup) {
        slot.appendChild(el("div",{"style":{fontSize:"9px",color:"var(--muted)",marginTop:"3px"}},`Seeds: ${safeText(g.aSeed)}${g.aGroup?`/${g.aGroup}`:""} × ${safeText(g.bSeed)}${g.bGroup?`/${g.bGroup}`:""}`));
      }
      wrap.appendChild(slot);
    });
  });
  return wrap;
}

function renderPodium(first, second, third) {
  const p = div("podium");
  [{l:"🥇 Campeão",t:first,c:"p1",tc:"var(--gold)"},{l:"🥈 Vice",t:second,c:"p2",tc:"var(--silver)"},{l:"🥉 3º Lugar",t:third,c:"p3",tc:"var(--bronze)"}]
    .forEach(({l,t:team,c,tc})=>{
      const slot=el("div",{"class":`p-slot ${c}`});
      slot.appendChild(el("div",{"class":"p-lbl","style":{color:tc}},l));
      slot.appendChild(el("div",{"class":"p-team","style":{color:team?tc:"var(--muted)"}},safeText(team)));
      p.appendChild(slot);
    });
  return p;
}
